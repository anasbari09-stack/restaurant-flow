<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Tracking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface:  '#0a0a0a',
            card:     '#141414',
            'card-2': '#1e1e1e',
            gold:     '#d4a520',
            'gold-h': '#b8920a',
          },
          fontFamily: {
            display: ['"Playfair Display"', 'Georgia', 'serif'],
            sans:    ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* ── skeleton shimmer ──────────────────────────────────────────────────── */
    .skel-row {
      height: 56px; border-radius: 12px;
      background: linear-gradient(90deg, #141414 25%, #1f1f1f 37%, #141414 63%);
      background-size: 400% 100%;
      animation: shimmer 1.4s ease infinite;
    }
    @keyframes shimmer { from { background-position: 100% 0; } to { background-position: -100% 0; } }

    /* ── progress stepper ──────────────────────────────────────────────────── */
    .step-fill { transition: width .6s cubic-bezier(.4,0,.2,1); }
    .step-dot  { transition: background-color .4s ease, border-color .4s ease, color .4s ease; }
    .step-dot.current { animation: dotPulse 1.6s ease-in-out infinite; }
    @keyframes dotPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(212,165,32,.55); }
      50%      { box-shadow: 0 0 0 7px rgba(212,165,32,0); }
    }

    /* ── status-change feedback ────────────────────────────────────────────── */
    .pulse-once { animation: pulseOnce .6s ease; }
    @keyframes pulseOnce { 0% { transform: scale(1); } 40% { transform: scale(1.035); } 100% { transform: scale(1); } }
    .glow { animation: glowPulse 1.8s ease-in-out 2; }
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(212,165,32,0); }
      50%      { box-shadow: 0 0 30px 2px rgba(212,165,32,.35); }
    }
    .item-flash { animation: itemFlash 1.3s ease; }
    @keyframes itemFlash { 0% { background-color: rgba(212,165,32,.20); } 100% { background-color: transparent; } }

    /* ── reveals ───────────────────────────────────────────────────────────── */
    .reveal-in { animation: revealIn .5s ease; }
    @keyframes revealIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
    .pop-in { animation: popIn .5s cubic-bezier(.2,.8,.2,1); }
    @keyframes popIn { from { opacity: 0; transform: scale(.8); } to { opacity: 1; transform: scale(1); } }

    /* ── live dot ──────────────────────────────────────────────────────────── */
    .live-dot { animation: livePulse 1.6s ease-in-out infinite; }
    @keyframes livePulse { 0%, 100% { opacity: 1; } 50% { opacity: .25; } }

    /* ── confetti ──────────────────────────────────────────────────────────── */
    .confetti-piece {
      position: absolute; top: -5vh; width: 8px; height: 14px; border-radius: 2px;
      will-change: transform, opacity;
      animation-name: confettiFall; animation-timing-function: cubic-bezier(.4,.2,.6,1);
      animation-fill-mode: forwards;
    }
    @keyframes confettiFall {
      to { transform: translate(var(--drift, 0), 110vh) rotate(720deg); opacity: .7; }
    }

    /* ── respect reduced motion ────────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .skel-row, .step-dot.current, .pulse-once, .glow, .item-flash,
      .reveal-in, .pop-in, .live-dot, .confetti-piece { animation: none !important; }
      .step-fill { transition: none !important; }
    }
  </style>
</head>
<body class="bg-surface text-gray-100 font-sans min-h-screen">

  <!-- Header -->
  <header class="bg-card border-b border-white/10 sticky top-0 z-10">
    <div class="max-w-2xl mx-auto px-4 py-4 flex items-center justify-between">
      <div>
        <a id="home-link" href="#" class="hidden items-center gap-1 text-xs text-gray-400 hover:text-gold mb-1">
          &larr; Back to Table Home
        </a>
        <h1 id="restaurant-name" class="font-display text-xl font-bold text-gold">Loading…</h1>
        <p id="table-label" class="text-sm text-gray-400"></p>
      </div>
      <div class="flex items-center gap-2.5">
        <span id="live-indicator" class="hidden items-center gap-1 text-[10px] uppercase tracking-wide text-gray-400">
          <span class="live-dot w-1.5 h-1.5 rounded-full bg-green-400 inline-block"></span>Live
        </span>
        <span id="order-label" class="text-sm font-mono text-gray-400"></span>
      </div>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-6 space-y-6">

    <!-- Progress stepper -->
    <div id="status-stepper" class="px-1 pt-1"></div>

    <!-- Overall status banner -->
    <div id="status-banner" class="rounded-2xl px-6 py-6 text-center border border-white/10 transition-colors">
      <p class="text-xs font-semibold uppercase tracking-widest mb-1 text-gray-500" id="banner-label">Status</p>
      <p id="banner-status" class="font-display text-3xl font-bold animate-pulse">Loading…</p>
    </div>

    <!-- Prominent review CTA (shown when SERVED and not yet reviewed) -->
    <button id="review-cta" onclick="scrollToReview()"
      class="hidden w-full bg-gold hover:bg-gold-h text-black font-bold py-3.5 rounded-xl transition-colors">
      &#x2B50; Leave a review
    </button>

    <!-- Items list -->
    <section>
      <div class="mb-3">
        <h2 class="font-display text-base font-semibold text-gold">Your items</h2>
        <div class="mt-1 w-8 h-px bg-gold/40"></div>
      </div>
      <div id="items-list" class="space-y-2">
        <div class="skel-row"></div>
        <div class="skel-row"></div>
        <div class="skel-row"></div>
      </div>
    </section>

    <!-- Help button (visible while active, hidden when SERVED) -->
    <div id="help-wrap" class="hidden">
      <button id="help-btn"
        class="w-full border border-gold/50 text-gold hover:bg-gold/10 font-medium py-3 rounded-xl transition-colors text-sm">
        Need help with my order
      </button>
      <p id="help-sent" class="hidden text-center text-sm text-green-400 py-2 font-medium">
        We've been notified — someone will be with you shortly.
      </p>
    </div>

    <!-- Review section (only when SERVED) -->
    <div id="review-wrap" class="hidden">
      <div id="review-form-wrap" class="bg-card rounded-2xl p-5">
        <h2 class="font-display text-base font-semibold text-white mb-4">How was your experience?</h2>

        <div class="space-y-3 mb-4">
          <div class="flex items-center justify-between">
            <span class="text-sm text-gray-400 w-24">Food</span>
            <div id="stars-food" class="flex gap-1"></div>
          </div>
          <div class="flex items-center justify-between">
            <span class="text-sm text-gray-400 w-24">Service</span>
            <div id="stars-service" class="flex gap-1"></div>
          </div>
          <div class="flex items-center justify-between">
            <span class="text-sm text-gray-400 w-24">Overall</span>
            <div id="stars-overall" class="flex gap-1"></div>
          </div>
        </div>

        <select id="problem-item-select"
          class="w-full bg-white/5 border border-white/10 text-white rounded-xl px-3 py-2 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-gold">
          <option value="" class="bg-card">Any item you'd like to flag? (optional)</option>
        </select>

        <textarea id="review-comment" rows="3" placeholder="Any comments? (optional)"
          class="w-full bg-white/5 border border-white/10 text-white placeholder-gray-500 rounded-xl px-3 py-2 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-gold resize-none"></textarea>

        <button onclick="submitReview()"
          class="w-full bg-gold hover:bg-gold-h text-black font-bold py-3 rounded-xl transition-colors">
          Submit Review
        </button>
        <p id="review-error" class="text-red-400 text-sm mt-2 hidden"></p>
      </div>
      <div id="review-thanks" class="hidden text-center py-6">
        <p class="text-3xl mb-2">&#x1F64F;</p>
        <p class="font-semibold text-gray-200">Thanks for your feedback!</p>
      </div>
    </div>

    <!-- Other active orders at this table -->
    <section id="other-orders-section" class="hidden">
      <div class="mb-3">
        <h2 class="font-display text-base font-semibold text-gold">Other active orders at this table</h2>
        <div class="mt-1 w-8 h-px bg-gold/40"></div>
      </div>
      <div id="other-orders-list" class="space-y-2"></div>
    </section>

    <!-- Order more -->
    <div id="order-more-wrap" class="hidden">
      <a id="order-more-link" href="#"
        class="block w-full text-center bg-gold hover:bg-gold-h text-black font-bold py-3 rounded-xl transition-colors">
        + Order more items
      </a>
    </div>

    <!-- Footer note -->
    <p id="footer-note" class="text-center text-xs text-gray-500 pb-4"></p>

  </main>

<script>
const STATUS_STYLE = {
  NEW:       { label: 'New',       icon: 'clock',        chip: 'bg-white/10 text-gray-300',      banner: 'bg-white/5 text-gray-200' },
  PREPARING: { label: 'Preparing', icon: 'flame',        chip: 'bg-amber-900/60 text-amber-300', banner: 'bg-amber-950/60 text-amber-200' },
  READY:     { label: 'Ready!',    icon: 'check-circle', chip: 'bg-green-900/60 text-green-300', banner: 'bg-green-950/60 text-green-200' },
  SERVED:    { label: 'Served',    icon: 'star',         chip: 'bg-teal-900/60 text-teal-300',   banner: 'bg-teal-950/60 text-teal-200' },
};

const orderId = window.location.pathname.split('/').filter(Boolean).pop();
let tableToken = null;
let pollTimer  = null;

// ── presentation state (Phase A glow-up — no effect on order logic) ───────────
const STEPS       = ['NEW', 'PREPARING', 'READY', 'SERVED'];
const STEP_LABELS = { NEW: 'New', PREPARING: 'Preparing', READY: 'Ready', SERVED: 'Served' };
const REDUCE      = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
let prevStatus    = null;
const prevItemStatus = {};

// ── progress stepper ──────────────────────────────────────────────────────────
function initStepper() {
  const dots = STEPS.map((st, i) => `
    <div class="flex flex-col items-center gap-1.5 z-10">
      <div id="step-dot-${i}" class="step-dot w-7 h-7 rounded-full border-2 bg-card-2 border-white/15 text-gray-500 flex items-center justify-center text-xs font-bold"></div>
      <span id="step-label-${i}" class="text-[10px] font-medium text-gray-500">${STEP_LABELS[st]}</span>
    </div>`).join('');
  document.getElementById('status-stepper').innerHTML = `
    <div class="relative">
      <div class="absolute left-0 right-0 top-[14px] h-0.5 bg-white/10"></div>
      <div id="step-fill" class="step-fill absolute left-0 top-[14px] h-0.5 bg-gold" style="width:0%"></div>
      <div class="relative flex justify-between">${dots}</div>
    </div>`;
}

function updateStepper(status) {
  const idx  = Math.max(0, STEPS.indexOf(status));
  const fill = document.getElementById('step-fill');
  if (fill) fill.style.width = (idx / (STEPS.length - 1) * 100) + '%';
  STEPS.forEach((st, i) => {
    const dot   = document.getElementById('step-dot-' + i);
    const label = document.getElementById('step-label-' + i);
    if (!dot) return;
    const reached = i <= idx, done = i < idx, cur = i === idx;
    dot.className = 'step-dot w-7 h-7 rounded-full border-2 flex items-center justify-center text-xs font-bold '
      + (reached ? 'bg-gold border-gold text-black' : 'bg-card-2 border-white/15 text-gray-500')
      + (cur ? ' current' : '');
    dot.textContent = done ? '✓' : '';
    if (label) label.className = 'text-[10px] font-medium ' + (reached ? 'text-gold' : 'text-gray-500');
  });
}

// ── celebration (one-shot on status advance) ──────────────────────────────────
function celebrate(status) {
  if (REDUCE) return;
  confettiBurst(status === 'SERVED' ? 90 : 40);
}

function confettiBurst(count) {
  if (REDUCE) return;
  const colors = ['#d4a520', '#ffffff', '#34d399', '#2dd4bf', '#f59e0b'];
  const wrap = document.createElement('div');
  wrap.className = 'fixed inset-0 pointer-events-none z-50 overflow-hidden';
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = (Math.random() * 100) + 'vw';
    p.style.background = colors[i % colors.length];
    p.style.animationDuration = (1.8 + Math.random() * 1.4) + 's';
    p.style.animationDelay = (Math.random() * 0.3) + 's';
    p.style.setProperty('--drift', (Math.random() * 200 - 100) + 'px');
    wrap.appendChild(p);
  }
  document.body.appendChild(wrap);
  setTimeout(() => wrap.remove(), 3400);
}

function getCsrfToken() {
  const match = document.cookie.match(/(?:^|;\s*)csrftoken=([^;]+)/);
  return match ? match[1] : '';
}

// ── polling ───────────────────────────────────────────────────────────────────
async function fetchStatus() {
  try {
    const res  = await fetch(`/api/orders/${orderId}/`);
    const data = await res.json();
    if (!res.ok) {
      showFetchError(data.error || 'Could not load order.');
      return;
    }
    renderOrder(data);
    if (data.status === 'SERVED') {
      clearInterval(pollTimer);
      pollTimer = null;
    }
    if (data.table_token) {
      tableToken = data.table_token;
      const link = document.getElementById('order-more-link');
      if (link.getAttribute('href') === '#') {
        // Carry this order's id so new items append to it (server only appends
        // while it's still active; a fully-served order falls back to a new one).
        link.href = `/menu/?table=${data.table_token}&add_to=${orderId}`;
        document.getElementById('order-more-wrap').classList.remove('hidden');
      }
      fetchSiblingOrders();
    }
  } catch {
    // network hiccup — keep polling, don't clear UI
  }
}

// ── render order ──────────────────────────────────────────────────────────────
function renderOrder(data) {
  document.getElementById('restaurant-name').textContent = data.restaurant_name;
  document.getElementById('table-label').textContent     = `Table ${data.table_number}`;
  document.getElementById('order-label').textContent     = `Order #${data.id}`;
  document.title = `Order #${data.id}`;

  // back-to-hub link (needs the table token from the order payload)
  const homeLink = document.getElementById('home-link');
  homeLink.href = `/?table=${encodeURIComponent(data.table_token)}`;
  homeLink.classList.remove('hidden');
  homeLink.classList.add('inline-flex');

  // banner
  const s = STATUS_STYLE[data.status] || STATUS_STYLE.NEW;
  const banner = document.getElementById('status-banner');
  banner.className = `rounded-2xl px-6 py-6 text-center border border-white/10 transition-colors ${s.banner}`;
  const bannerStatus = document.getElementById('banner-status');
  bannerStatus.classList.remove('animate-pulse');
  bannerStatus.textContent = s.label;

  // progress stepper + status-change feedback
  updateStepper(data.status);
  const statusChanged = prevStatus !== null && data.status !== prevStatus;
  if (statusChanged) {
    banner.classList.remove('pulse-once'); void banner.offsetWidth; banner.classList.add('pulse-once');
    if (data.status === 'READY' || data.status === 'SERVED') {
      banner.classList.remove('glow'); void banner.offsetWidth; banner.classList.add('glow');
      celebrate(data.status);
    }
  }

  // live indicator (hidden once served)
  const live = document.getElementById('live-indicator');
  live.classList.toggle('hidden', data.status === 'SERVED');
  live.classList.toggle('inline-flex', data.status !== 'SERVED');

  // items
  const list = document.getElementById('items-list');
  list.innerHTML = '';
  data.items.forEach(item => {
    const cs = STATUS_STYLE[item.status] || STATUS_STYLE.NEW;
    const row = document.createElement('div');
    const itemChanged = prevItemStatus[item.id] && prevItemStatus[item.id] !== item.status;
    row.className = 'bg-card border border-white/[0.06] rounded-xl px-4 py-3 flex items-center justify-between'
      + (itemChanged ? ' item-flash' : '');
    prevItemStatus[item.id] = item.status;
    row.innerHTML = `
      <div class="flex-1 min-w-0">
        <p class="font-medium text-white">${esc(item.name)}</p>
        ${item.notes ? `<p class="text-xs text-gray-500 mt-0.5">${esc(item.notes)}</p>` : ''}
      </div>
      <div class="flex items-center gap-3 ml-3 flex-shrink-0">
        <span class="text-sm text-gray-400">&times;${item.quantity}</span>
        <span class="inline-flex items-center gap-1 text-xs font-semibold px-2.5 py-1 rounded-full ${cs.chip}">
          <i data-lucide="${cs.icon}" class="w-3 h-3"></i>${cs.label}
        </span>
      </div>`;
    list.appendChild(row);
  });

  lucide.createIcons();

  // help button — visible while active, hidden when SERVED
  document.getElementById('help-wrap').classList.toggle('hidden', data.status === 'SERVED');

  // review section — only when SERVED
  const reviewWrap = document.getElementById('review-wrap');
  const reviewCta  = document.getElementById('review-cta');
  // Prominent CTA at the top: only when there's a review still to leave.
  reviewCta.classList.toggle('hidden', !(data.status === 'SERVED' && !data.has_review));
  if (data.status === 'SERVED') {
    const wasHidden = reviewWrap.classList.contains('hidden');
    reviewWrap.classList.remove('hidden');
    if (wasHidden) { reviewWrap.classList.remove('reveal-in'); void reviewWrap.offsetWidth; reviewWrap.classList.add('reveal-in'); }
    const sel = document.getElementById('problem-item-select');
    if (sel.options.length === 1) {
      data.items.forEach(item => {
        const opt = document.createElement('option');
        opt.value = item.id;
        opt.textContent = `${esc(item.name)} x${item.quantity}`;
        opt.className = 'bg-card';
        sel.appendChild(opt);
      });
    }
    if (data.has_review) {
      document.getElementById('review-form-wrap').classList.add('hidden');
      const thanks = document.getElementById('review-thanks');
      const thanksHidden = thanks.classList.contains('hidden');
      thanks.classList.remove('hidden');
      if (thanksHidden) thanks.classList.add('pop-in');
    }
  } else {
    reviewWrap.classList.add('hidden');
  }

  // footer
  const note = document.getElementById('footer-note');
  note.textContent = data.status === 'SERVED'
    ? 'Your order is complete! Thank you for dining with us.'
    : 'This page updates automatically every 6 seconds.';

  prevStatus = data.status;
}

// ── sibling orders ────────────────────────────────────────────────────────────
async function fetchSiblingOrders() {
  if (!tableToken) return;
  try {
    const res  = await fetch(`/api/orders/?table=${encodeURIComponent(tableToken)}`);
    const data = await res.json();
    if (!res.ok) return;
    renderSiblingOrders(data);
  } catch {}
}

function renderSiblingOrders(orders) {
  const others  = orders.filter(o => String(o.id) !== String(orderId));
  const section = document.getElementById('other-orders-section');
  const list    = document.getElementById('other-orders-list');

  if (others.length === 0) {
    section.classList.add('hidden');
    return;
  }
  section.classList.remove('hidden');
  list.innerHTML = '';
  others.forEach(o => {
    const s = STATUS_STYLE[o.status] || STATUS_STYLE.NEW;
    const a = document.createElement('a');
    a.href      = `/order/${o.id}/`;
    a.className = 'flex items-center justify-between bg-card border border-white/[0.06] hover:bg-card-2 rounded-xl px-4 py-3 transition-colors';
    a.innerHTML = `
      <span class="text-sm font-medium text-white">Order #${o.id}
        <span class="text-gray-400">&middot; ${o.item_count} item${o.item_count !== 1 ? 's' : ''}</span>
      </span>
      <span class="inline-flex items-center gap-1 text-xs font-semibold px-2.5 py-1 rounded-full ${s.chip}">
        <i data-lucide="${s.icon}" class="w-3 h-3"></i>${s.label}
      </span>`;
    list.appendChild(a);
  });
  lucide.createIcons();
}

// ── help ──────────────────────────────────────────────────────────────────────
async function requestHelp() {
  document.getElementById('help-btn').classList.add('hidden');
  try {
    await fetch(`/api/orders/${orderId}/help/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
      body: JSON.stringify({}),
    });
  } catch {}
  document.getElementById('help-sent').classList.remove('hidden');
}

// ── review ────────────────────────────────────────────────────────────────────
const ratings = { food: 0, service: 0, overall: 0 };

function buildStars(containerId, key) {
  const container = document.getElementById(containerId);
  for (let i = 1; i <= 5; i++) {
    const btn = document.createElement('button');
    btn.dataset.star = i;
    btn.textContent  = '★';
    btn.className    = 'text-2xl text-gray-600 hover:text-gold transition hover:scale-125 origin-center';
    btn.addEventListener('click', () => {
      ratings[key] = i;
      container.querySelectorAll('button').forEach(b => {
        b.classList.toggle('text-gold',   +b.dataset.star <= i);
        b.classList.toggle('text-gray-600', +b.dataset.star >  i);
      });
    });
    container.appendChild(btn);
  }
}

function initReview() {
  buildStars('stars-food',    'food');
  buildStars('stars-service', 'service');
  buildStars('stars-overall', 'overall');
}

async function submitReview() {
  const errEl = document.getElementById('review-error');
  errEl.classList.add('hidden');

  if (!ratings.food || !ratings.service || !ratings.overall) {
    errEl.textContent = 'Please rate food, service, and overall before submitting.';
    errEl.classList.remove('hidden');
    return;
  }

  const selVal  = document.getElementById('problem-item-select').value;
  const payload = {
    order_id:       parseInt(orderId),
    food_rating:    ratings.food,
    service_rating: ratings.service,
    overall_rating: ratings.overall,
    comment:        document.getElementById('review-comment').value.trim(),
  };
  if (selVal) payload.problem_item_id = parseInt(selVal);

  try {
    const res  = await fetch('/api/reviews/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (res.ok) {
      document.getElementById('review-form-wrap').classList.add('hidden');
      const thanks = document.getElementById('review-thanks');
      thanks.classList.remove('hidden');
      thanks.classList.add('pop-in');
    } else {
      const key = Object.keys(data)[0];
      errEl.textContent = Array.isArray(data[key]) ? data[key][0] : JSON.stringify(data);
      errEl.classList.remove('hidden');
    }
  } catch {
    errEl.textContent = 'Could not submit. Please try again.';
    errEl.classList.remove('hidden');
  }
}

// ── util ──────────────────────────────────────────────────────────────────────
function showFetchError(msg) {
  document.getElementById('restaurant-name').textContent = 'Error';
  document.getElementById('footer-note').textContent = msg;
}

function scrollToReview() {
  const el = document.getElementById('review-wrap');
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── boot ──────────────────────────────────────────────────────────────────────
document.getElementById('help-btn').addEventListener('click', requestHelp);
initStepper();
initReview();
fetchStatus();
pollTimer = setInterval(fetchStatus, 6000);

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    clearInterval(pollTimer);
    pollTimer = null;
  } else if (!pollTimer) {
    fetchStatus();
    pollTimer = setInterval(fetchStatus, 6000);
  }
});

lucide.createIcons();
</script>
