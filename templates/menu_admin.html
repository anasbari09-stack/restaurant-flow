<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Header -->
  <header class="bg-gray-900 text-white sticky top-0 z-10">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-lg font-bold">Menu Management</h1>
        <p class="text-xs text-gray-400">La Casa</p>
      </div>
      <div class="flex items-center gap-2">
        <a href="/staff/admin/"
          class="text-xs text-gray-400 hover:text-white border border-gray-600 hover:border-gray-400 px-3 py-1.5 rounded-lg transition-colors">
          ← Dashboard
        </a>
        <button onclick="logout()"
          class="text-xs text-gray-400 hover:text-white border border-gray-600 hover:border-gray-400 px-3 py-1.5 rounded-lg transition-colors">
          Log out
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-6">

    <div class="flex items-center justify-between mb-5">
      <p class="text-sm text-gray-500" id="count-label">Loading…</p>
      <button onclick="openModal()"
        class="bg-gray-900 hover:bg-gray-700 text-white text-sm font-semibold px-4 py-2 rounded-xl transition-colors">
        + Add Item
      </button>
    </div>

    <div id="list-error" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl px-4 py-3 mb-4"></div>
    <div id="items-root" class="space-y-8"></div>

  </main>

  <!-- Add/Edit modal -->
  <div id="modal-overlay" class="fixed inset-0 bg-black/50 z-30 hidden" onclick="closeModal()"></div>
  <div id="modal" class="fixed inset-x-0 bottom-0 sm:inset-0 sm:m-auto sm:h-fit sm:max-w-lg z-40 hidden">
    <div class="bg-white rounded-t-2xl sm:rounded-2xl shadow-2xl max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100 sticky top-0 bg-white">
        <h2 id="modal-title" class="text-base font-bold text-gray-900">Add Item</h2>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-700 text-2xl leading-none">&times;</button>
      </div>

      <div class="px-5 py-4 space-y-4">
        <input type="hidden" id="f-id" />

        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Name *</label>
          <input id="f-name" type="text" maxlength="200"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800" />
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Description</label>
          <textarea id="f-description" rows="2"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800 resize-none"></textarea>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Price *</label>
            <input id="f-price" type="number" min="0" step="0.01"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Category *</label>
            <select id="f-category"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-gray-800">
              <option value="food">Food</option>
              <option value="drink">Drink</option>
              <option value="dessert">Dessert</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Image URL</label>
          <input id="f-image" type="url" placeholder="https://…"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800" />
        </div>

        <div class="flex items-center gap-6 pt-1">
          <label class="flex items-center gap-2 text-sm text-gray-700">
            <input id="f-available" type="checkbox" class="w-4 h-4 accent-gray-900" /> Available
          </label>
          <label class="flex items-center gap-2 text-sm text-gray-700">
            <input id="f-featured" type="checkbox" class="w-4 h-4 accent-amber-500" /> Featured
          </label>
        </div>

        <p id="modal-error" class="hidden text-red-600 text-sm"></p>
      </div>

      <div class="px-5 py-4 border-t border-gray-100 flex gap-2 sticky bottom-0 bg-white">
        <button onclick="closeModal()"
          class="flex-1 border border-gray-300 text-gray-700 text-sm font-semibold py-2.5 rounded-xl hover:bg-gray-50 transition-colors">
          Cancel
        </button>
        <button id="save-btn" onclick="saveItem()"
          class="flex-1 bg-gray-900 hover:bg-gray-700 text-white text-sm font-semibold py-2.5 rounded-xl transition-colors">
          Save
        </button>
      </div>
    </div>
  </div>

<script>
const API = '/api/admin/menu-items/';
const CATEGORY_ORDER  = ['food', 'drink', 'dessert'];
const CATEGORY_LABELS = { food: 'Food', drink: 'Drinks', dessert: 'Desserts' };

let items = [];

function getCsrfToken() {
  const match = document.cookie.match(/(?:^|;\s*)csrftoken=([^;]+)/);
  return match ? match[1] : '';
}

function authGuard(res) {
  if (res.status === 401 || res.status === 403) {
    window.location.href = '/staff/login/';
    return false;
  }
  return true;
}

// ── load ────────────────────────────────────────────────────────────────────
async function fetchItems() {
  try {
    const res = await fetch(API);
    if (!authGuard(res)) return;
    if (!res.ok) { showListError('Failed to load menu items.'); return; }
    items = await res.json();
    renderItems();
  } catch {
    showListError('Could not connect to the server.');
  }
}

function showListError(msg) {
  const el = document.getElementById('list-error');
  el.textContent = msg;
  el.classList.remove('hidden');
}

function renderItems() {
  document.getElementById('list-error').classList.add('hidden');
  document.getElementById('count-label').textContent =
    `${items.length} item${items.length !== 1 ? 's' : ''}`;

  const root = document.getElementById('items-root');
  root.innerHTML = '';

  CATEGORY_ORDER.forEach(cat => {
    const group = items.filter(i => i.category === cat);
    if (!group.length) return;

    const section = document.createElement('section');
    const heading = document.createElement('h2');
    heading.className = 'text-sm font-bold text-gray-700 uppercase tracking-wide mb-3';
    heading.textContent = CATEGORY_LABELS[cat];
    section.appendChild(heading);

    const wrap = document.createElement('div');
    wrap.className = 'space-y-2';
    group.forEach(item => wrap.appendChild(buildRow(item)));
    section.appendChild(wrap);
    root.appendChild(section);
  });
}

function buildRow(item) {
  const row = document.createElement('div');
  row.className = 'bg-white rounded-xl shadow-sm px-3 py-3 flex items-center gap-3'
    + (item.is_available ? '' : ' opacity-60');

  const thumb = item.image_url
    ? `<img src="${esc(item.image_url)}" alt="" class="w-14 h-14 rounded-lg object-cover flex-shrink-0 bg-gray-100" onerror="this.style.visibility='hidden'">`
    : `<div class="w-14 h-14 rounded-lg bg-gray-100 flex items-center justify-center text-gray-300 text-xl flex-shrink-0">🍽</div>`;

  row.innerHTML = `
    ${thumb}
    <div class="flex-1 min-w-0">
      <div class="flex items-center gap-2">
        <p class="text-sm font-semibold text-gray-900 truncate">${esc(item.name)}</p>
        ${item.is_featured ? '<span class="text-[10px] font-bold uppercase bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded">Featured</span>' : ''}
        ${item.is_available ? '' : '<span class="text-[10px] font-bold uppercase bg-gray-200 text-gray-600 px-1.5 py-0.5 rounded">Hidden</span>'}
      </div>
      ${item.description ? `<p class="text-xs text-gray-500 truncate mt-0.5">${esc(item.description)}</p>` : ''}
      <p class="text-sm font-bold text-gray-800 mt-0.5">$${parseFloat(item.price).toFixed(2)}</p>
    </div>
    <div class="flex flex-col items-end gap-1.5 flex-shrink-0">
      <div class="flex gap-1.5">
        <button data-act="avail" class="text-xs font-semibold px-2.5 py-1 rounded-lg transition-colors ${item.is_available ? 'bg-green-100 text-green-700 hover:bg-green-200' : 'bg-gray-200 text-gray-600 hover:bg-gray-300'}">
          ${item.is_available ? 'Available' : 'Unavailable'}
        </button>
        <button data-act="feat" class="text-xs font-semibold px-2.5 py-1 rounded-lg transition-colors ${item.is_featured ? 'bg-amber-100 text-amber-700 hover:bg-amber-200' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}">
          ${item.is_featured ? '★ Featured' : '☆ Feature'}
        </button>
      </div>
      <div class="flex gap-1.5">
        <button data-act="edit" class="text-xs font-semibold px-2.5 py-1 rounded-lg bg-gray-900 text-white hover:bg-gray-700 transition-colors">Edit</button>
        <button data-act="del" class="text-xs font-semibold px-2.5 py-1 rounded-lg border border-red-300 text-red-600 hover:bg-red-50 transition-colors">Delete</button>
      </div>
    </div>
  `;

  row.querySelector('[data-act="avail"]').addEventListener('click',
    () => toggleField(item, 'is_available', !item.is_available));
  row.querySelector('[data-act="feat"]').addEventListener('click',
    () => toggleField(item, 'is_featured', !item.is_featured));
  row.querySelector('[data-act="edit"]').addEventListener('click', () => openModal(item));
  row.querySelector('[data-act="del"]').addEventListener('click', () => deleteItem(item));
  return row;
}

// ── quick toggles ─────────────────────────────────────────────────────────────
async function toggleField(item, field, value) {
  try {
    const res = await fetch(`${API}${item.id}/`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
      body: JSON.stringify({ [field]: value }),
    });
    if (!authGuard(res)) return;
    if (res.ok) {
      const updated = await res.json();
      const idx = items.findIndex(i => i.id === item.id);
      if (idx !== -1) items[idx] = updated;
      renderItems();
    }
  } catch {}
}

// ── modal ─────────────────────────────────────────────────────────────────────
function openModal(item) {
  document.getElementById('modal-error').classList.add('hidden');
  document.getElementById('modal-title').textContent = item ? 'Edit Item' : 'Add Item';
  document.getElementById('f-id').value          = item ? item.id : '';
  document.getElementById('f-name').value        = item ? item.name : '';
  document.getElementById('f-description').value = item ? (item.description || '') : '';
  document.getElementById('f-price').value       = item ? item.price : '';
  document.getElementById('f-category').value    = item ? item.category : 'food';
  document.getElementById('f-image').value       = item ? (item.image_url || '') : '';
  document.getElementById('f-available').checked = item ? item.is_available : true;
  document.getElementById('f-featured').checked  = item ? item.is_featured : false;

  document.getElementById('modal-overlay').classList.remove('hidden');
  document.getElementById('modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  document.getElementById('modal').classList.add('hidden');
}

async function saveItem() {
  const errEl = document.getElementById('modal-error');
  errEl.classList.add('hidden');

  const id      = document.getElementById('f-id').value;
  const name    = document.getElementById('f-name').value.trim();
  const priceR  = document.getElementById('f-price').value;

  if (!name) { return showModalError('Name is required.'); }
  if (priceR === '' || isNaN(parseFloat(priceR)) || parseFloat(priceR) < 0) {
    return showModalError('Enter a valid price (0 or more).');
  }

  const payload = {
    name,
    description: document.getElementById('f-description').value.trim(),
    price: parseFloat(priceR).toFixed(2),
    category: document.getElementById('f-category').value,
    image_url: document.getElementById('f-image').value.trim(),
    is_available: document.getElementById('f-available').checked,
    is_featured: document.getElementById('f-featured').checked,
  };

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  try {
    const res = await fetch(id ? `${API}${id}/` : API, {
      method: id ? 'PATCH' : 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
      body: JSON.stringify(payload),
    });
    if (!authGuard(res)) return;
    const data = await res.json();
    if (res.ok) {
      closeModal();
      await fetchItems();
    } else {
      showModalError(extractError(data));
    }
  } catch {
    showModalError('Could not connect. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save';
  }
}

function showModalError(msg) {
  const el = document.getElementById('modal-error');
  el.textContent = msg;
  el.classList.remove('hidden');
}

// ── delete (with PROTECT-aware messaging) ──────────────────────────────────────
async function deleteItem(item) {
  if (!confirm(`Delete "${item.name}"? This cannot be undone.`)) return;
  try {
    const res = await fetch(`${API}${item.id}/`, {
      method: 'DELETE',
      headers: { 'X-CSRFToken': getCsrfToken() },
    });
    if (!authGuard(res)) return;
    if (res.status === 204) {
      await fetchItems();
    } else {
      const data = await res.json().catch(() => ({}));
      alert(extractError(data) || 'Could not delete this item.');
    }
  } catch {
    alert('Could not connect. Please try again.');
  }
}

// ── util ──────────────────────────────────────────────────────────────────────
function extractError(data) {
  if (!data) return '';
  if (typeof data === 'string') return data;
  if (data.error) return data.error;
  const key = Object.keys(data)[0];
  if (!key) return '';
  const val = data[key];
  return Array.isArray(val) ? `${key}: ${val[0]}` : `${key}: ${val}`;
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

async function logout() {
  try {
    await fetch('/api/staff/logout/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
      body: JSON.stringify({}),
    });
  } catch {}
  window.location.href = '/staff/login/';
}

// ── boot ──────────────────────────────────────────────────────────────────────
fetchItems();
</script>
</body>
</html>
