<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Table Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Header -->
  <header class="bg-gray-900 text-white sticky top-0 z-10">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-lg font-bold">Table Management</h1>
        <p class="text-xs text-gray-400">La Casa</p>
      </div>
      <div class="flex items-center gap-2">
        <a href="/staff/admin/"
          class="text-xs text-gray-400 hover:text-white border border-gray-600 hover:border-gray-400 px-3 py-1.5 rounded-lg transition-colors">
          ← Dashboard
        </a>
        <button onclick="logout()"
          class="text-xs text-gray-400 hover:text-white border border-gray-600 hover:border-gray-400 px-3 py-1.5 rounded-lg transition-colors">
          Log out
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-6">

    <div class="flex items-center justify-between mb-5">
      <p class="text-sm text-gray-500" id="count-label">Loading…</p>
      <button onclick="openModal()"
        class="bg-gray-900 hover:bg-gray-700 text-white text-sm font-semibold px-4 py-2 rounded-xl transition-colors">
        + Add Table
      </button>
    </div>

    <div id="list-error" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl px-4 py-3 mb-4"></div>
    <div id="tables-root" class="space-y-2"></div>

  </main>

  <!-- Add table modal -->
  <div id="modal-overlay" class="fixed inset-0 bg-black/50 z-30 hidden" onclick="closeModal()"></div>
  <div id="modal" class="fixed inset-x-0 bottom-0 sm:inset-0 sm:m-auto sm:h-fit sm:max-w-md z-40 hidden">
    <div class="bg-white rounded-t-2xl sm:rounded-2xl shadow-2xl">
      <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
        <h2 class="text-base font-bold text-gray-900">Add Table</h2>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-700 text-2xl leading-none">&times;</button>
      </div>
      <div class="px-5 py-4 space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Table number *</label>
          <input id="f-number" type="number" min="1" step="1"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Serveur (optional)</label>
          <input id="f-server" type="text" maxlength="100" placeholder="e.g. Sara"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800" />
        </div>
        <p id="modal-error" class="hidden text-red-600 text-sm"></p>
      </div>
      <div class="px-5 py-4 border-t border-gray-100 flex gap-2">
        <button onclick="closeModal()"
          class="flex-1 border border-gray-300 text-gray-700 text-sm font-semibold py-2.5 rounded-xl hover:bg-gray-50 transition-colors">
          Cancel
        </button>
        <button id="save-btn" onclick="saveTable()"
          class="flex-1 bg-gray-900 hover:bg-gray-700 text-white text-sm font-semibold py-2.5 rounded-xl transition-colors">
          Add
        </button>
      </div>
    </div>
  </div>

<script>
const API = '/api/admin/tables/';
let tables = [];

function getCsrfToken() {
  const match = document.cookie.match(/(?:^|;\s*)csrftoken=([^;]+)/);
  return match ? match[1] : '';
}

function authGuard(res) {
  if (res.status === 401 || res.status === 403) {
    window.location.href = '/staff/login/';
    return false;
  }
  return true;
}

// ── load ────────────────────────────────────────────────────────────────────
async function fetchTables() {
  try {
    const res = await fetch(API);
    if (!authGuard(res)) return;
    if (!res.ok) { showListError('Failed to load tables.'); return; }
    tables = await res.json();
    renderTables();
  } catch {
    showListError('Could not connect to the server.');
  }
}

function showListError(msg) {
  const el = document.getElementById('list-error');
  el.textContent = msg;
  el.classList.remove('hidden');
}

function renderTables() {
  document.getElementById('list-error').classList.add('hidden');
  document.getElementById('count-label').textContent =
    `${tables.length} table${tables.length !== 1 ? 's' : ''}`;
  const root = document.getElementById('tables-root');
  root.innerHTML = '';
  tables.forEach(t => root.appendChild(buildRow(t)));
}

function buildRow(t) {
  const row = document.createElement('div');
  row.className = 'bg-white rounded-xl shadow-sm px-4 py-3';
  const menuUrl = `${location.origin}/menu/?table=${t.qr_token}`;

  row.innerHTML = `
    <div class="flex items-center gap-3 flex-wrap">
      <div class="w-10 h-10 rounded-lg bg-gray-900 text-white font-bold flex items-center justify-center flex-shrink-0">
        ${t.number}
      </div>
      <div class="flex-1 min-w-[160px]">
        <p class="text-sm font-semibold text-gray-900">Table ${t.number}
          <span class="text-xs font-normal text-gray-400">· ${t.order_count} order${t.order_count !== 1 ? 's' : ''}</span>
        </p>
        <div class="flex items-center gap-2 mt-1">
          <label class="text-xs text-gray-500">Serveur:</label>
          <input data-act="server" value="${esc(t.server_name)}" placeholder="Unassigned"
            class="text-sm border border-gray-200 rounded-md px-2 py-1 w-32 focus:outline-none focus:ring-2 focus:ring-gray-800" />
        </div>
      </div>
      <div class="flex items-center gap-1.5 flex-shrink-0">
        <button data-act="copy" class="text-xs font-semibold px-2.5 py-1.5 rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200 transition-colors">Copy menu link</button>
        <button data-act="del" class="text-xs font-semibold px-2.5 py-1.5 rounded-lg border border-red-300 text-red-600 hover:bg-red-50 transition-colors">Delete</button>
      </div>
    </div>
    <p class="text-[11px] text-gray-400 mt-2 break-all font-mono">${esc(menuUrl)}</p>
  `;

  const serverInput = row.querySelector('[data-act="server"]');
  // Save on blur or Enter, only if changed.
  const commit = () => {
    const val = serverInput.value.trim();
    if (val !== t.server_name) saveServer(t, val);
  };
  serverInput.addEventListener('blur', commit);
  serverInput.addEventListener('keydown', e => { if (e.key === 'Enter') serverInput.blur(); });

  row.querySelector('[data-act="copy"]').addEventListener('click', (e) => {
    navigator.clipboard.writeText(menuUrl).then(() => {
      const b = e.target; const old = b.textContent;
      b.textContent = 'Copied!'; setTimeout(() => b.textContent = old, 1200);
    }).catch(() => {});
  });
  row.querySelector('[data-act="del"]').addEventListener('click', () => deleteTable(t));
  return row;
}

// ── update server ─────────────────────────────────────────────────────────────
async function saveServer(t, value) {
  try {
    const res = await fetch(`${API}${t.id}/`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
      body: JSON.stringify({ server_name: value }),
    });
    if (!authGuard(res)) return;
    if (res.ok) {
      const updated = await res.json();
      const idx = tables.findIndex(x => x.id === t.id);
      if (idx !== -1) tables[idx] = updated;
    }
  } catch {}
}

// ── add table ─────────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modal-error').classList.add('hidden');
  document.getElementById('f-number').value = '';
  document.getElementById('f-server').value = '';
  document.getElementById('modal-overlay').classList.remove('hidden');
  document.getElementById('modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  document.getElementById('modal').classList.add('hidden');
}

async function saveTable() {
  const errEl = document.getElementById('modal-error');
  errEl.classList.add('hidden');
  const numR = document.getElementById('f-number').value;
  if (numR === '' || parseInt(numR) < 1) {
    errEl.textContent = 'Enter a valid table number (1 or more).';
    errEl.classList.remove('hidden');
    return;
  }
  const payload = {
    number: parseInt(numR),
    server_name: document.getElementById('f-server').value.trim(),
  };
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Adding…';
  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
      body: JSON.stringify(payload),
    });
    if (!authGuard(res)) return;
    const data = await res.json();
    if (res.ok) { closeModal(); await fetchTables(); }
    else {
      errEl.textContent = extractError(data);
      errEl.classList.remove('hidden');
    }
  } catch {
    errEl.textContent = 'Could not connect. Please try again.';
    errEl.classList.remove('hidden');
  } finally {
    btn.disabled = false; btn.textContent = 'Add';
  }
}

// ── delete (guarded) ──────────────────────────────────────────────────────────
async function deleteTable(t) {
  if (!confirm(`Delete Table ${t.number}? This cannot be undone.`)) return;
  try {
    const res = await fetch(`${API}${t.id}/`, {
      method: 'DELETE',
      headers: { 'X-CSRFToken': getCsrfToken() },
    });
    if (!authGuard(res)) return;
    if (res.status === 204) { await fetchTables(); }
    else {
      const data = await res.json().catch(() => ({}));
      alert(extractError(data) || 'Could not delete this table.');
    }
  } catch {
    alert('Could not connect. Please try again.');
  }
}

// ── util ──────────────────────────────────────────────────────────────────────
function extractError(data) {
  if (!data) return '';
  if (typeof data === 'string') return data;
  if (data.error) return data.error;
  const key = Object.keys(data)[0];
  if (!key) return '';
  const val = data[key];
  return Array.isArray(val) ? `${key}: ${val[0]}` : `${key}: ${val}`;
}

function esc(str) {
  return String(str == null ? '' : str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

async function logout() {
  try {
    await fetch('/api/staff/logout/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
      body: JSON.stringify({}),
    });
  } catch {}
  window.location.href = '/staff/login/';
}

// ── boot ──────────────────────────────────────────────────────────────────────
fetchTables();
</script>
</body>
</html>
