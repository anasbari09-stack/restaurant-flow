<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface:  '#0a0a0a',
            card:     '#141414',
            'card-2': '#1e1e1e',
            gold:     '#d4a520',
            'gold-h': '#b8920a',
          },
          fontFamily: {
            display: ['"Playfair Display"', 'Georgia', 'serif'],
            sans:    ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* ── scrollbar hide ──────────────────────────────────────────────────────── */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    /* ── card entrance stagger ───────────────────────────────────────────────── */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
    .card-animate {
      animation: fadeSlideUp .35s ease forwards;
      opacity: 0;
    }

    /* ── card hover lift ─────────────────────────────────────────────────────── */
    .menu-card { transition: transform .2s ease, box-shadow .2s ease; }
    .menu-card:hover {
      transform: scale(1.02) translateY(-3px);
      box-shadow: 0 24px 48px rgba(0,0,0,.65);
    }

    /* ── button press ────────────────────────────────────────────────────────── */
    button:active:not(:disabled) {
      transform: scale(0.93);
      transition: transform .05s ease;
    }

    /* ── cart bump ───────────────────────────────────────────────────────────── */
    @keyframes cartBump {
      0%   { transform: scale(1);    }
      40%  { transform: scale(1.4);  }
      70%  { transform: scale(0.88); }
      100% { transform: scale(1);    }
    }
    .cart-bump { animation: cartBump .4s ease; }

    /* ── offers carousel: snap with a peek of the next card ──────────────────── */
    #offers-carousel {
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      overscroll-behavior-x: contain;
    }
    .offer-slide { scroll-snap-align: start; }

    /* ── carousel dots ───────────────────────────────────────────────────────── */
    .dot { width: 6px; height: 6px; border-radius: 9999px; background: rgba(255,255,255,.25); transition: all .25s ease; }
    .dot.active { width: 18px; background: #d4a520; }

    /* ── image fade-in ───────────────────────────────────────────────────────── */
    .img-fade { opacity: 0; transition: opacity .5s ease; }
    .img-fade.loaded { opacity: 1; }

    /* ── floating cart bar ───────────────────────────────────────────────────── */
    #cart-bar { transition: transform .3s cubic-bezier(.22,1,.36,1), opacity .25s ease; }
    #cart-bar.hidden-bar { transform: translateY(160%); opacity: 0; pointer-events: none; }

    @media (prefers-reduced-motion: reduce) {
      .card-animate, .cart-bump { animation: none !important; opacity: 1 !important; }
      .menu-card, button:active, #cart-bar, #cart-drawer { transition: none !important; }
      .menu-card:hover { transform: none !important; }
      html { scroll-behavior: auto !important; }
    }
  </style>
</head>
<body class="bg-surface text-gray-100 font-sans min-h-screen">

  <!-- Header -->
  <header class="bg-card/95 backdrop-blur border-b border-white/10 sticky top-0 z-20">
    <div class="max-w-3xl mx-auto px-4 py-4 flex items-center justify-between">
      <div>
        <h1 id="restaurant-name" class="font-display text-xl font-bold text-gold">Loading…</h1>
        <p id="table-label" class="text-sm text-gray-400"></p>
      </div>
      <button id="cart-btn" onclick="openCart()"
        class="relative p-2.5 bg-gold hover:bg-gold-h text-black rounded-full transition-colors">
        <i data-lucide="shopping-cart" class="w-5 h-5"></i>
        <span id="cart-badge"
          class="absolute -top-1 -right-1 bg-red-500 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center hidden">
          0
        </span>
      </button>
    </div>
  </header>

  <!-- Special Offers carousel -->
  <section id="offers-section" class="hidden max-w-3xl mx-auto px-4 pt-6">
    <div class="flex items-end justify-between mb-3">
      <div>
        <p class="text-[11px] font-semibold tracking-[0.2em] text-gold/80 uppercase">Special Offers</p>
        <h2 class="font-display text-2xl font-bold text-white mt-0.5">Today's Picks</h2>
      </div>
      <div class="flex gap-2">
        <button onclick="scrollOffers(-1)" aria-label="Previous offer"
          class="w-9 h-9 rounded-full bg-card-2 border border-white/10 text-gray-300 hover:text-white hover:border-gold/50 flex items-center justify-center transition-colors">
          <i data-lucide="chevron-left" class="w-5 h-5"></i>
        </button>
        <button onclick="scrollOffers(1)" aria-label="Next offer"
          class="w-9 h-9 rounded-full bg-card-2 border border-white/10 text-gray-300 hover:text-white hover:border-gold/50 flex items-center justify-center transition-colors">
          <i data-lucide="chevron-right" class="w-5 h-5"></i>
        </button>
      </div>
    </div>
    <div id="offers-carousel" class="flex gap-3 overflow-x-auto scrollbar-hide -mx-1 px-1 pb-1"></div>
    <div id="offers-dots" class="flex items-center justify-center gap-1.5 mt-3"></div>
  </section>

  <!-- Menu intro (not sticky) -->
  <div id="menu-intro" class="hidden max-w-3xl mx-auto px-4 pt-7">
    <p class="text-[11px] font-semibold tracking-[0.2em] text-gold/80 uppercase">Our Menu</p>
    <h2 class="font-display text-2xl font-bold text-white mt-0.5">Browse the Menu</h2>
  </div>

  <!-- Sticky category nav (pills only) -->
  <div id="menu-bar" class="hidden bg-surface/95 backdrop-blur sticky top-[69px] z-10 border-b border-white/5 mt-3">
    <div class="max-w-3xl mx-auto px-4 py-3">
      <div id="filter-pills" class="flex gap-2 overflow-x-auto scrollbar-hide"></div>
    </div>
  </div>

  <!-- Menu content -->
  <main class="max-w-3xl mx-auto px-4 py-6">
    <div id="menu-error" class="hidden bg-red-900/30 border border-red-500/30 text-red-400 rounded-lg p-4 mb-4"></div>
    <div id="menu-content" class="space-y-10"></div>
  </main>

  <!-- Cart overlay -->
  <div id="cart-overlay" class="fixed inset-0 bg-black/60 z-30 hidden" onclick="closeCart()"></div>

  <!-- Cart drawer -->
  <aside id="cart-drawer"
    class="fixed right-0 top-0 h-full w-full max-w-sm bg-card-2 shadow-2xl z-40 translate-x-full transition-transform duration-300 flex flex-col border-l border-white/10">
    <div class="flex items-center justify-between px-4 py-4 border-b border-white/10">
      <h2 class="font-display text-lg font-bold text-white">Your Order</h2>
      <button onclick="closeCart()" class="text-gray-400 hover:text-white text-2xl leading-none transition-colors">&times;</button>
    </div>
    <div id="cart-items" class="flex-1 overflow-y-auto px-4 py-4 space-y-3"></div>
    <div class="px-4 py-4 border-t border-white/10 space-y-3 bg-card-2 pb-[calc(1rem+env(safe-area-inset-bottom))]">
      <div class="flex justify-between text-base font-bold">
        <span class="text-gray-300">Total</span>
        <span id="cart-total" class="text-gold">$0.00</span>
      </div>
      <input id="phone-input" type="tel" inputmode="tel" placeholder="Phone number (optional — for loyalty points)"
        class="w-full bg-white/5 border border-white/10 text-white placeholder-gray-500 rounded-xl px-3.5 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-gold" />
      <button id="order-btn" onclick="submitOrder()" disabled
        class="w-full bg-gold hover:bg-gold-h disabled:opacity-40 disabled:cursor-not-allowed text-black font-bold py-3.5 rounded-xl transition-colors">
        Place Order
      </button>
      <p id="order-error" class="text-red-400 text-sm hidden"></p>
    </div>
  </aside>

  <!-- Floating "View order" bar (shown when cart has items) -->
  <div id="cart-bar" class="hidden-bar fixed bottom-0 inset-x-0 z-30 px-4 pb-[calc(1rem+env(safe-area-inset-bottom))]">
    <button onclick="openCart()"
      class="max-w-3xl mx-auto w-full flex items-center justify-between gap-3 bg-gold hover:bg-gold-h text-black font-bold px-4 py-3.5 rounded-2xl shadow-2xl shadow-black/50">
      <span class="flex items-center gap-2.5">
        <span id="cart-bar-count" class="inline-flex items-center justify-center min-w-6 h-6 px-1.5 bg-black/15 rounded-full text-sm">0</span>
        <span>View order</span>
      </span>
      <span id="cart-bar-total">$0.00</span>
    </button>
  </div>


<script>
// ─── state ─────────────────────────────────────────────────────────────────
const state = {
  tableToken: new URLSearchParams(location.search).get('table') || '',
  // "Order more items" passes ?add_to=<orderId> so new items append to that
  // active order instead of creating a new one (server validates appendability).
  addToOrderId: new URLSearchParams(location.search).get('add_to') || '',
  // Assisted ordering: a logged-in serveur placing an order for the table.
  // Posts to the serveur endpoint (attributes the order to the serveur) and
  // returns to the serveur dashboard instead of the customer tracking page.
  assisted: new URLSearchParams(location.search).get('assisted') === '1',
  menuData: null,
  cart: {},
  itemsById: {},   // id -> menu item (for cart thumbnails)
  categories: [],  // ordered category keys currently rendered
};

const CATEGORY_ORDER  = ['food', 'drink', 'dessert'];
const CATEGORY_LABELS = { food: 'Food', drink: 'Drinks', dessert: 'Desserts' };
const CATEGORY_ICONS  = { food: 'utensils', drink: 'wine', dessert: 'cake-slice' };

// ─── CSRF ───────────────────────────────────────────────────────────────────
function getCsrfToken() {
  const match = document.cookie.match(/(?:^|;\s*)csrftoken=([^;]+)/);
  return match ? match[1] : '';
}

// ─── init ───────────────────────────────────────────────────────────────────
async function init() {
  if (!state.tableToken) {
    showError('No table token found in URL. Please scan the QR code again.');
    return;
  }
  try {
    const res = await fetch(`/api/menu/?table=${encodeURIComponent(state.tableToken)}`);
    const data = await res.json();
    if (!res.ok) {
      showError(data.error || 'Failed to load the menu.');
      return;
    }
    state.menuData = data;
    renderPage(data);
  } catch {
    showError('Could not connect to the server. Please try again.');
  }
  lucide.createIcons();
}

function showError(msg) {
  const el = document.getElementById('menu-error');
  el.textContent = msg;
  el.classList.remove('hidden');
  document.getElementById('restaurant-name').textContent = 'Error';
}

// ─── render page ────────────────────────────────────────────────────────────
function renderPage(data) {
  document.getElementById('restaurant-name').textContent = data.restaurant.name;
  document.getElementById('table-label').textContent     = `Table ${data.table.number}`;
  document.title = data.restaurant.name;

  if (state.assisted) {
    document.getElementById('table-label').innerHTML =
      `Table ${data.table.number} <span class="ml-1 text-xs font-semibold text-black bg-gold rounded px-1.5 py-0.5">Assisted order</span>`;
    const orderBtn = document.getElementById('order-btn');
    if (orderBtn) orderBtn.textContent = 'Place Order for Customer';
  }

  // Build an id -> item lookup for cart thumbnails (menu + featured).
  (data.featured || []).forEach(it => { state.itemsById[it.id] = it; });
  Object.values(data.menu || {}).forEach(list => list.forEach(it => { state.itemsById[it.id] = it; }));

  renderOffers(data.featured || []);

  const categories = CATEGORY_ORDER.filter(c => data.menu[c]?.length);
  state.categories = categories;
  renderFilterPills(categories);
  renderSections(data, categories);

  // Entrance animation for the first sections, then enable scroll-spy nav.
  categories.forEach(animateSectionCards);
  setupScrollSpy(categories);
  updateCartBadge();
}

// ─── special offers carousel ────────────────────────────────────────────────
function renderOffers(featured) {
  if (!featured.length) return;
  document.getElementById('offers-section').classList.remove('hidden');
  const carousel = document.getElementById('offers-carousel');

  const single = featured.length === 1;
  featured.forEach(item => {
    const id    = item.id;
    const name  = item.name;
    const price = parseFloat(item.price);

    const slide = document.createElement('article');
    // A peek of the next card hints there's more to swipe (only when >1).
    slide.className = `offer-slide relative flex-shrink-0 ${single ? 'w-full' : 'w-[86%] sm:w-[70%]'} rounded-3xl overflow-hidden bg-card border border-white/10 shadow-2xl`;

    slide.innerHTML = `
      <div class="relative h-48 sm:h-56 bg-card-2">
        ${item.image_url ? `<img src="${esc(item.image_url)}" alt="${esc(name)}"
            class="img-fade absolute inset-0 w-full h-full object-cover"
            onload="this.classList.add('loaded')" onerror="this.remove()">` : ''}
        <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/35 to-black/10"></div>
        <span class="absolute top-3 left-3 inline-flex items-center gap-1 bg-gold text-black text-[11px] font-bold uppercase tracking-wide px-2.5 py-1 rounded-full">
          <i data-lucide="star" class="w-3 h-3"></i> Chef's Pick
        </span>
        <div class="absolute bottom-0 left-0 right-0 p-4 sm:p-5">
          <h3 class="font-display text-2xl font-bold text-white leading-tight">${esc(name)}</h3>
          ${item.description ? `<p class="text-sm text-gray-300 mt-1 line-clamp-2 max-w-md">${esc(item.description)}</p>` : ''}
          <div class="mt-3 flex items-center justify-between gap-3">
            <span class="text-gold font-bold text-2xl">$${price.toFixed(2)}</span>
            <div id="ctrl-${id}" data-variant="lg"></div>
          </div>
        </div>
      </div>
    `;
    carousel.appendChild(slide);
    renderControls(id, name, price, slide.querySelector(`#ctrl-${id}`));
  });

  // Dots (only meaningful with multiple offers).
  const dotsWrap = document.getElementById('offers-dots');
  if (!single) {
    featured.forEach((_, i) => {
      const dot = document.createElement('button');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.setAttribute('aria-label', `Offer ${i + 1}`);
      dot.addEventListener('click', () => goToOffer(i));
      dotsWrap.appendChild(dot);
    });
    carousel.addEventListener('scroll', () => {
      clearTimeout(carousel._dotT);
      carousel._dotT = setTimeout(updateOfferDots, 60);
    });
  }
}

function offerSlideWidth() {
  const c = document.getElementById('offers-carousel');
  const first = c.querySelector('.offer-slide');
  if (!first) return c.clientWidth;
  const gap = parseFloat(getComputedStyle(c).columnGap || '12') || 12;
  return first.getBoundingClientRect().width + gap;
}

function updateOfferDots() {
  const c = document.getElementById('offers-carousel');
  const idx = Math.round(c.scrollLeft / offerSlideWidth());
  document.querySelectorAll('#offers-dots .dot').forEach((d, i) =>
    d.classList.toggle('active', i === idx));
}

function goToOffer(i) {
  document.getElementById('offers-carousel').scrollTo({ left: i * offerSlideWidth(), behavior: 'smooth' });
}

function scrollOffers(dir) {
  const c = document.getElementById('offers-carousel');
  c.scrollBy({ left: dir * offerSlideWidth(), behavior: 'smooth' });
}

// ─── filter pills ───────────────────────────────────────────────────────────
function renderFilterPills(categories) {
  document.getElementById('menu-intro').classList.remove('hidden');
  document.getElementById('menu-bar').classList.remove('hidden');
  const wrap = document.getElementById('filter-pills');
  // Pills are jump-to-section navigation; scroll-spy keeps the active one in sync.
  categories.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.id        = `pill-${cat}`;
    btn.className = pillClass(i === 0);
    btn.onclick   = () => scrollToCategory(cat);
    btn.innerHTML = `<i data-lucide="${CATEGORY_ICONS[cat] || 'utensils'}" class="w-4 h-4 flex-shrink-0"></i><span>${CATEGORY_LABELS[cat] || cat}</span>`;
    wrap.appendChild(btn);
  });
}

function pillClass(active) {
  const base = 'flex items-center gap-1.5 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap border transition-colors';
  return active
    ? `${base} bg-gold border-gold text-black font-semibold`
    : `${base} bg-card-2 border-white/10 text-gray-400 hover:text-white hover:border-white/25`;
}

// Pixels to offset for the sticky header + category bar when scrolling to a section.
function stickyOffset() {
  const header = document.querySelector('header');
  const bar = document.getElementById('menu-bar');
  return (header ? header.offsetHeight : 0) + (bar ? bar.offsetHeight : 0) + 8;
}

function setActivePill(cat) {
  document.querySelectorAll('#filter-pills button').forEach(btn => {
    const isActive = btn.id === `pill-${cat}`;
    btn.className = pillClass(isActive);
    if (isActive) btn.scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });
  });
  lucide.createIcons();
}

function scrollToCategory(cat) {
  const section = document.getElementById(`cat-${cat}`);
  if (!section) return;
  const y = section.getBoundingClientRect().top + window.scrollY - stickyOffset();
  window.scrollTo({ top: y, behavior: 'smooth' });
  setActivePill(cat);
}

function setupScrollSpy(categories) {
  if (!('IntersectionObserver' in window) || categories.length < 2) return;
  const offset = stickyOffset();
  const obs = new IntersectionObserver((entries) => {
    // Pick the top-most section currently crossing the line below the sticky bars.
    const visible = entries.filter(e => e.isIntersecting)
      .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
    if (visible.length) {
      setActivePill(visible[0].target.id.replace('cat-', ''));
    }
  }, { rootMargin: `-${offset}px 0px -68% 0px`, threshold: 0 });
  categories.forEach(c => {
    const s = document.getElementById(`cat-${c}`);
    if (s) obs.observe(s);
  });
}

// ─── sections / grid ────────────────────────────────────────────────────────
function renderSections(data, categories) {
  const contentEl = document.getElementById('menu-content');
  categories.forEach(cat => {
    const section = document.createElement('section');
    section.id    = `cat-${cat}`;

    const heading = document.createElement('div');
    heading.className = 'mb-4';
    heading.innerHTML = `
      <h2 class="font-display text-xl font-bold text-gold">${CATEGORY_LABELS[cat]}</h2>
      <div class="mt-1.5 w-10 h-px bg-gold/40"></div>
    `;
    section.appendChild(heading);

    const grid = document.createElement('div');
    grid.className = 'grid gap-4 sm:grid-cols-2';
    data.menu[cat].forEach(item => grid.appendChild(buildItemCard(item)));
    section.appendChild(grid);

    contentEl.appendChild(section);
  });
}

// ─── card stagger ────────────────────────────────────────────────────────────
function animateSectionCards(cat) {
  const cards = document.getElementById(`cat-${cat}`)?.querySelectorAll('.menu-card') ?? [];
  cards.forEach((card, i) => {
    card.classList.remove('card-animate');
    void card.offsetWidth; // force reflow so animation restarts
    card.style.animationDelay = `${i * 40}ms`;
    card.classList.add('card-animate');
  });
}

// ─── item card ──────────────────────────────────────────────────────────────
function buildItemCard(item) {
  const card = document.createElement('div');
  card.className = 'menu-card bg-card rounded-2xl overflow-hidden shadow-lg shadow-black/30 border border-white/[0.06] flex flex-col';

  if (item.image_url) {
    const img = document.createElement('img');
    img.src       = item.image_url;
    img.alt       = item.name;
    img.className = 'img-fade w-full h-32 object-cover';
    img.addEventListener('load',  () => img.classList.add('loaded'));
    img.addEventListener('error', () => img.style.display = 'none');
    card.appendChild(img);
  }

  const body = document.createElement('div');
  body.className = 'p-4 flex flex-col flex-1';

  const info = document.createElement('div');
  info.className = 'flex-1 min-w-0';
  info.innerHTML = `
    <p class="font-semibold text-white leading-snug">${esc(item.name)}</p>
    ${item.description ? `<p class="text-xs text-gray-400 mt-1 line-clamp-2">${esc(item.description)}</p>` : ''}
  `;

  const row = document.createElement('div');
  row.className = 'mt-3 flex items-center justify-between gap-2';
  const price = document.createElement('span');
  price.className = 'text-gold font-bold text-lg';
  price.textContent = `$${parseFloat(item.price).toFixed(2)}`;

  const ctrl = document.createElement('div');
  ctrl.id = `ctrl-${item.id}`;

  row.append(price, ctrl);
  body.appendChild(info);
  body.appendChild(row);
  card.appendChild(body);

  renderControls(item.id, item.name, parseFloat(item.price), ctrl);
  return card;
}

// ─── add/qty controls (shared by grid + offers; cart logic unchanged) ─────────
function renderControls(id, name, price, el) {
  const ctrl = el || document.getElementById(`ctrl-${id}`);
  if (!ctrl) return;
  const large = ctrl.dataset.variant === 'lg';
  const qty   = state.cart[id]?.qty || 0;
  ctrl.innerHTML = '';

  if (qty === 0) {
    const btn = document.createElement('button');
    btn.setAttribute('aria-label', `Add ${name}`);
    if (large) {
      btn.className = 'flex items-center gap-2 bg-gold hover:bg-gold-h text-black font-bold px-5 py-2.5 rounded-full transition-colors';
      btn.innerHTML = '<span>Add to Order</span>';
    } else {
      // Clear labelled pill (was a bare "+") for a stronger affordance.
      btn.className = 'flex items-center gap-1 bg-gold hover:bg-gold-h text-black font-bold text-sm pl-2.5 pr-3.5 py-2 rounded-full transition-colors flex-shrink-0';
      btn.innerHTML = '<span class="text-base leading-none">+</span><span>Add</span>';
    }
    btn.addEventListener('click', () => addToCart(id, name, price));
    ctrl.appendChild(btn);
  } else {
    // Unified stepper pill for both grid and offers.
    const wrap = document.createElement('div');
    wrap.className = large
      ? 'flex items-center gap-3 bg-black/40 backdrop-blur rounded-full px-2 py-1'
      : 'flex items-center gap-2 bg-card-2 border border-white/10 rounded-full px-1.5 py-1';

    const btnSize = large ? 'w-9 h-9 text-lg' : 'w-7 h-7';

    const minus = document.createElement('button');
    minus.setAttribute('aria-label', 'Decrease quantity');
    minus.className = `${btnSize} rounded-full bg-white/10 hover:bg-white/20 text-white font-bold flex items-center justify-center transition-colors`;
    minus.textContent = '−';
    minus.addEventListener('click', () => changeQty(id, -1));

    const countEl = document.createElement('span');
    countEl.className = `font-bold text-white text-center ${large ? 'w-6 text-lg' : 'w-5'}`;
    countEl.textContent = qty;

    const plus = document.createElement('button');
    plus.setAttribute('aria-label', 'Increase quantity');
    plus.className = `${btnSize} rounded-full bg-gold hover:bg-gold-h text-black font-bold flex items-center justify-center transition-colors`;
    plus.textContent = '+';
    plus.addEventListener('click', () => changeQty(id, 1));

    wrap.append(minus, countEl, plus);
    ctrl.appendChild(wrap);
  }
}

// ─── cart logic ─────────────────────────────────────────────────────────────
function addToCart(id, name, price) {
  state.cart[id] = { name, price, qty: 1 };
  // brief checkmark on the + button (grid only)
  const btn = document.querySelector(`#ctrl-${id} button`);
  const ctrl = document.getElementById(`ctrl-${id}`);
  if (btn && ctrl?.dataset.variant !== 'lg') {
    btn.textContent = '✓';
    setTimeout(() => {
      afterCartChange(id, name, price);
      triggerCartBump();
    }, 240);
  } else {
    afterCartChange(id, name, price);
    triggerCartBump();
  }
}

function changeQty(id, delta) {
  if (!state.cart[id]) return;
  state.cart[id].qty += delta;
  const { name, price } = state.cart[id];
  if (state.cart[id].qty <= 0) delete state.cart[id];
  afterCartChange(id, name, price);
}

function afterCartChange(id, name, price) {
  renderControls(id, name, price);
  renderCartItems();
  updateCartBadge();
}

function updateCartBadge() {
  const count = Object.values(state.cart).reduce((s, i) => s + i.qty, 0);
  const total = Object.values(state.cart).reduce((s, i) => s + i.price * i.qty, 0);
  const badge = document.getElementById('cart-badge');
  badge.textContent = count;
  badge.classList.toggle('hidden', count === 0);

  // Place Order is only actionable with items.
  const orderBtn = document.getElementById('order-btn');
  if (orderBtn) orderBtn.disabled = count === 0;

  updateCartBar(count, total);
}

function updateCartBar(count, total) {
  const bar = document.getElementById('cart-bar');
  if (!bar) return;
  const drawerOpen = !document.getElementById('cart-drawer').classList.contains('translate-x-full');
  document.getElementById('cart-bar-count').textContent = count;
  document.getElementById('cart-bar-total').textContent = `$${total.toFixed(2)}`;
  // Show the floating bar only when there are items and the drawer is closed.
  bar.classList.toggle('hidden-bar', !(count > 0 && !drawerOpen));
}

function triggerCartBump() {
  const btn = document.getElementById('cart-btn');
  btn.classList.remove('cart-bump');
  void btn.offsetWidth;
  btn.classList.add('cart-bump');
  btn.addEventListener('animationend', () => btn.classList.remove('cart-bump'), { once: true });
}

// ─── cart drawer ────────────────────────────────────────────────────────────
function openCart() {
  renderCartItems();
  document.getElementById('cart-overlay').classList.remove('hidden');
  document.getElementById('cart-drawer').classList.remove('translate-x-full');
  document.getElementById('cart-bar').classList.add('hidden-bar'); // avoid overlap with drawer
}

function closeCart() {
  document.getElementById('cart-overlay').classList.add('hidden');
  document.getElementById('cart-drawer').classList.add('translate-x-full');
  updateCartBadge(); // re-show the floating bar if items remain
}

function renderCartItems() {
  const entries = Object.entries(state.cart);
  const el      = document.getElementById('cart-items');

  if (entries.length === 0) {
    el.innerHTML = `
      <div class="flex flex-col items-center justify-center text-center py-16 px-6">
        <span class="flex items-center justify-center w-16 h-16 rounded-full bg-white/5 text-gray-500 mb-4">
          <i data-lucide="shopping-bag" class="w-7 h-7"></i>
        </span>
        <p class="text-gray-300 font-medium">Your cart is empty</p>
        <p class="text-gray-500 text-sm mt-1">Add a few dishes from the menu to get started.</p>
      </div>`;
    document.getElementById('cart-total').textContent = '$0.00';
    lucide.createIcons();
    return;
  }

  let total = 0;
  el.innerHTML = entries.map(([id, item]) => {
    const sub = item.price * item.qty;
    total += sub;
    const img = state.itemsById[id] && state.itemsById[id].image_url;
    const thumb = img
      ? `<img src="${esc(img)}" alt="" class="w-12 h-12 rounded-lg object-cover flex-shrink-0">`
      : `<span class="w-12 h-12 rounded-lg bg-white/5 flex items-center justify-center text-gray-600 flex-shrink-0"><i data-lucide="utensils" class="w-5 h-5"></i></span>`;
    return `
      <div class="flex items-center gap-3">
        ${thumb}
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-white truncate">${esc(item.name)}</p>
          <p class="text-xs text-gold font-semibold mt-0.5">$${sub.toFixed(2)}</p>
        </div>
        <div class="flex items-center gap-2 bg-card border border-white/10 rounded-full px-1.5 py-1 flex-shrink-0">
          <button onclick="changeQty(${id}, -1)" aria-label="Decrease"
            class="w-7 h-7 rounded-full bg-white/10 hover:bg-white/20 text-white text-sm font-bold flex items-center justify-center transition-colors">
            &minus;
          </button>
          <span class="w-5 text-center text-sm font-bold text-white">${item.qty}</span>
          <button onclick="changeQty(${id}, 1)" aria-label="Increase"
            class="w-7 h-7 rounded-full bg-gold hover:bg-gold-h text-black text-sm font-bold flex items-center justify-center transition-colors">
            +
          </button>
        </div>
      </div>`;
  }).join('');

  document.getElementById('cart-total').textContent = `$${total.toFixed(2)}`;
  lucide.createIcons();
}

// ─── submit order ────────────────────────────────────────────────────────────
async function submitOrder() {
  const entries = Object.entries(state.cart);
  if (entries.length === 0) return;

  const btn    = document.getElementById('order-btn');
  const errEl  = document.getElementById('order-error');
  btn.disabled = true;
  btn.textContent = 'Placing order…';
  errEl.classList.add('hidden');

  const phone   = document.getElementById('phone-input').value.trim();
  const payload = {
    table: state.tableToken,
    items: entries.map(([id, item]) => ({
      menu_item_id: parseInt(id),
      quantity: item.qty,
    })),
  };
  if (phone) payload.phone = phone;
  if (state.addToOrderId) payload.order_id = parseInt(state.addToOrderId);

  const endpoint = state.assisted ? '/api/serveur/orders/' : '/api/orders/';

  try {
    const res  = await fetch(endpoint, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': getCsrfToken(),
      },
      body: JSON.stringify(payload),
    });

    if (res.status === 401 && state.assisted) {
      window.location.href = '/serveur/login/';
      return;
    }

    const data = await res.json();

    if (!res.ok) {
      errEl.textContent = extractError(data);
      errEl.classList.remove('hidden');
      return;
    }

    // Assisted orders return the serveur to their dashboard; customers track.
    window.location.href = state.assisted ? '/serveur/' : '/order/' + data.order_id + '/';

  } catch {
    errEl.textContent = 'Could not connect. Please try again.';
    errEl.classList.remove('hidden');
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Place Order';
  }
}

function extractError(data) {
  if (typeof data === 'string') return data;
  if (data.error)               return data.error;
  const key = Object.keys(data)[0];
  const val = data[key];
  return Array.isArray(val) ? `${key}: ${val[0]}` : JSON.stringify(data);
}

// ─── util ────────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ─── boot ────────────────────────────────────────────────────────────────────
init();
</script>
