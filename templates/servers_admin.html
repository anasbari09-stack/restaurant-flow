<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serveur Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Header -->
  <header class="bg-gray-900 text-white sticky top-0 z-10">
    <div class="max-w-3xl mx-auto px-4 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-lg font-bold">Serveur Management</h1>
        <p class="text-xs text-gray-400">La Casa</p>
      </div>
      <div class="flex items-center gap-2">
        <a href="/staff/admin/"
          class="text-xs text-gray-400 hover:text-white border border-gray-600 hover:border-gray-400 px-3 py-1.5 rounded-lg transition-colors">
          ← Dashboard
        </a>
        <button onclick="logout()"
          class="text-xs text-gray-400 hover:text-white border border-gray-600 hover:border-gray-400 px-3 py-1.5 rounded-lg transition-colors">
          Log out
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-6">

    <div class="flex items-center justify-between mb-5">
      <p class="text-sm text-gray-500" id="count-label">Loading…</p>
      <button onclick="openModal()"
        class="bg-gray-900 hover:bg-gray-700 text-white text-sm font-semibold px-4 py-2 rounded-xl transition-colors">
        + Add Serveur
      </button>
    </div>

    <div id="list-error" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl px-4 py-3 mb-4"></div>
    <div id="servers-root" class="space-y-2"></div>
    <p class="text-xs text-gray-400 mt-4">Serveurs are never deleted — deactivate instead to preserve order &amp; review history. Deactivated serveurs can't log in and won't appear in the table assignment dropdown.</p>

  </main>

  <!-- Add serveur modal -->
  <div id="modal-overlay" class="fixed inset-0 bg-black/50 z-30 hidden" onclick="closeModal()"></div>
  <div id="modal" class="fixed inset-x-0 bottom-0 sm:inset-0 sm:m-auto sm:h-fit sm:max-w-md z-40 hidden">
    <div class="bg-white rounded-t-2xl sm:rounded-2xl shadow-2xl">
      <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
        <h2 class="text-base font-bold text-gray-900">Add Serveur</h2>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-700 text-2xl leading-none">&times;</button>
      </div>
      <div class="px-5 py-4 space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Name *</label>
          <input id="f-name" type="text" maxlength="100" placeholder="e.g. Sara"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Passcode * (4 digits)</label>
          <input id="f-passcode" type="text" inputmode="numeric" maxlength="4" placeholder="e.g. 2580"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800" />
        </div>
        <p id="modal-error" class="hidden text-red-600 text-sm"></p>
      </div>
      <div class="px-5 py-4 border-t border-gray-100 flex gap-2">
        <button onclick="closeModal()"
          class="flex-1 border border-gray-300 text-gray-700 text-sm font-semibold py-2.5 rounded-xl hover:bg-gray-50 transition-colors">
          Cancel
        </button>
        <button id="save-btn" onclick="addServer()"
          class="flex-1 bg-gray-900 hover:bg-gray-700 text-white text-sm font-semibold py-2.5 rounded-xl transition-colors">
          Add
        </button>
      </div>
    </div>
  </div>

<script>
const API = '/api/admin/servers/';
let servers = [];

function getCsrfToken() {
  const match = document.cookie.match(/(?:^|;\s*)csrftoken=([^;]+)/);
  return match ? match[1] : '';
}

function authGuard(res) {
  if (res.status === 401 || res.status === 403) {
    window.location.href = '/staff/login/';
    return false;
  }
  return true;
}

async function fetchServers() {
  try {
    const res = await fetch(`${API}?include_inactive=1`);
    if (!authGuard(res)) return;
    if (!res.ok) { showListError('Failed to load serveurs.'); return; }
    servers = await res.json();
    renderServers();
  } catch {
    showListError('Could not connect to the server.');
  }
}

function showListError(msg) {
  const el = document.getElementById('list-error');
  el.textContent = msg;
  el.classList.remove('hidden');
}

function renderServers() {
  document.getElementById('list-error').classList.add('hidden');
  const active = servers.filter(s => s.is_active).length;
  document.getElementById('count-label').textContent =
    `${servers.length} serveur${servers.length !== 1 ? 's' : ''} · ${active} active`;
  const root = document.getElementById('servers-root');
  root.innerHTML = '';
  if (servers.length === 0) {
    root.innerHTML = '<p class="text-sm text-gray-400 py-8 text-center">No serveurs yet. Add one to get started.</p>';
    return;
  }
  servers.forEach(s => root.appendChild(buildRow(s)));
}

function buildRow(s) {
  const row = document.createElement('div');
  row.className = 'bg-white rounded-xl shadow-sm px-4 py-3 ' + (s.is_active ? '' : 'opacity-60');

  const badge = s.is_active
    ? '<span class="text-[10px] font-bold uppercase bg-green-100 text-green-700 px-1.5 py-0.5 rounded">Active</span>'
    : '<span class="text-[10px] font-bold uppercase bg-gray-200 text-gray-500 px-1.5 py-0.5 rounded">Inactive</span>';

  row.innerHTML = `
    <div class="flex items-center gap-3 flex-wrap">
      <div class="w-10 h-10 rounded-full bg-indigo-900 text-white font-bold flex items-center justify-center flex-shrink-0">
        ${esc((s.name[0] || '?').toUpperCase())}
      </div>
      <div class="flex-1 min-w-[220px] grid grid-cols-2 gap-2">
        <div>
          <label class="block text-[11px] text-gray-500">Name</label>
          <input data-act="name" value="${esc(s.name)}" maxlength="100"
            class="text-sm border border-gray-200 rounded-md px-2 py-1 w-full focus:outline-none focus:ring-2 focus:ring-gray-800" />
        </div>
        <div>
          <label class="block text-[11px] text-gray-500">Passcode</label>
          <input data-act="passcode" value="${esc(s.passcode)}" inputmode="numeric" maxlength="4"
            class="text-sm border border-gray-200 rounded-md px-2 py-1 w-full font-mono focus:outline-none focus:ring-2 focus:ring-gray-800" />
        </div>
      </div>
      <div class="flex items-center gap-1.5 flex-shrink-0">
        ${badge}
        <button data-act="save" class="text-xs font-semibold px-2.5 py-1.5 rounded-lg bg-gray-900 text-white hover:bg-gray-700 transition-colors">Save</button>
        <button data-act="toggle" class="text-xs font-semibold px-2.5 py-1.5 rounded-lg border ${s.is_active ? 'border-amber-300 text-amber-700 hover:bg-amber-50' : 'border-green-300 text-green-700 hover:bg-green-50'} transition-colors">
          ${s.is_active ? 'Deactivate' : 'Activate'}
        </button>
      </div>
    </div>
    <p data-act="row-error" class="hidden text-red-600 text-xs mt-2"></p>
  `;

  const nameInput = row.querySelector('[data-act="name"]');
  const passInput = row.querySelector('[data-act="passcode"]');
  const rowError  = row.querySelector('[data-act="row-error"]');

  row.querySelector('[data-act="save"]').addEventListener('click', () =>
    patchServer(s, { name: nameInput.value.trim(), passcode: passInput.value.trim() }, rowError));

  row.querySelector('[data-act="toggle"]').addEventListener('click', () =>
    patchServer(s, { is_active: !s.is_active }, rowError));

  return row;
}

async function patchServer(s, body, rowError) {
  if (rowError) rowError.classList.add('hidden');
  try {
    const res = await fetch(`${API}${s.id}/`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
      body: JSON.stringify(body),
    });
    if (!authGuard(res)) return;
    const data = await res.json();
    if (res.ok) {
      const idx = servers.findIndex(x => x.id === s.id);
      if (idx !== -1) servers[idx] = data;
      renderServers();
    } else if (rowError) {
      rowError.textContent = extractError(data);
      rowError.classList.remove('hidden');
    }
  } catch {
    if (rowError) { rowError.textContent = 'Could not connect.'; rowError.classList.remove('hidden'); }
  }
}

// ── add ──────────────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modal-error').classList.add('hidden');
  document.getElementById('f-name').value = '';
  document.getElementById('f-passcode').value = '';
  document.getElementById('modal-overlay').classList.remove('hidden');
  document.getElementById('modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  document.getElementById('modal').classList.add('hidden');
}

async function addServer() {
  const errEl = document.getElementById('modal-error');
  errEl.classList.add('hidden');
  const name = document.getElementById('f-name').value.trim();
  const passcode = document.getElementById('f-passcode').value.trim();
  if (!name) { showModalError('Name is required.'); return; }
  if (!/^\d{4}$/.test(passcode)) { showModalError('Passcode must be exactly 4 digits.'); return; }

  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Adding…';
  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
      body: JSON.stringify({ name, passcode, is_active: true }),
    });
    if (!authGuard(res)) return;
    const data = await res.json();
    if (res.ok) { closeModal(); await fetchServers(); }
    else { showModalError(extractError(data)); }
  } catch {
    showModalError('Could not connect. Please try again.');
  } finally {
    btn.disabled = false; btn.textContent = 'Add';
  }
}

function showModalError(msg) {
  const el = document.getElementById('modal-error');
  el.textContent = msg;
  el.classList.remove('hidden');
}

// ── util ─────────────────────────────────────────────────────────────────────
function extractError(data) {
  if (!data) return 'Something went wrong.';
  if (typeof data === 'string') return data;
  if (data.error) return data.error;
  const key = Object.keys(data)[0];
  if (!key) return 'Something went wrong.';
  const val = data[key];
  return Array.isArray(val) ? `${key}: ${val[0]}` : `${key}: ${val}`;
}

function esc(str) {
  return String(str == null ? '' : str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

async function logout() {
  try {
    await fetch('/api/staff/logout/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
      body: JSON.stringify({}),
    });
  } catch {}
  window.location.href = '/staff/login/';
}

fetchServers();
</script>
</body>
</html>
