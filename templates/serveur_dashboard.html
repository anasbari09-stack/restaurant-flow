<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serveur Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Header -->
  <header class="bg-indigo-900 text-white sticky top-0 z-10">
    <div class="max-w-2xl mx-auto px-4 py-4 flex items-center justify-between">
      <div>
        <h1 id="server-name" class="text-lg font-bold">Loading…</h1>
        <p class="text-xs text-indigo-300">Serveur Dashboard</p>
      </div>
      <button onclick="logout()"
        class="text-xs text-indigo-300 hover:text-white border border-indigo-600 hover:border-indigo-400 px-3 py-1.5 rounded-lg transition-colors">
        Log out
      </button>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-6 space-y-6">

    <!-- Cancellation requests (distinct, shown first) -->
    <section id="cancel-section" class="hidden">
      <h2 class="text-sm font-bold text-red-600 uppercase tracking-wide mb-2">⚠ Cancellation Requests</h2>
      <div id="cancel-container" class="space-y-2"></div>
    </section>

    <!-- Help / call requests -->
    <section id="requests-section" class="hidden">
      <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wide mb-2">Help Requests</h2>
      <div id="requests-container" class="space-y-2"></div>
    </section>

    <!-- Ready to serve -->
    <section id="ready-section" class="hidden">
      <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wide mb-2">Ready to Serve</h2>
      <div id="ready-container" class="space-y-2"></div>
    </section>

    <!-- My tables -->
    <section>
      <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wide mb-2">My Tables</h2>
      <div id="tables-container" class="grid grid-cols-2 sm:grid-cols-3 gap-2"></div>
    </section>

    <!-- Active orders -->
    <section>
      <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wide mb-2">Active Orders</h2>
      <div id="orders-container" class="space-y-3"></div>
    </section>

  </main>

<script>
const STATUS_BADGE = {
  NEW:       'bg-blue-100 text-blue-700',
  PREPARING: 'bg-amber-100 text-amber-700',
  READY:     'bg-green-100 text-green-700',
  SERVED:    'bg-gray-200 text-gray-600',
};
const STATUS_LABEL = { NEW: 'New', PREPARING: 'Preparing', READY: 'Ready', SERVED: 'Served' };

let pollTimer = null;

function getCsrfToken() {
  const match = document.cookie.match(/(?:^|;\s*)csrftoken=([^;]+)/);
  return match ? match[1] : '';
}

function init() {
  fetchDashboard();
  pollTimer = setInterval(fetchDashboard, 6000);

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      clearInterval(pollTimer);
      pollTimer = null;
    } else {
      fetchDashboard();
      pollTimer = setInterval(fetchDashboard, 6000);
    }
  });
}

async function fetchDashboard() {
  try {
    const res = await fetch('/api/serveur/dashboard/');
    if (res.status === 401) {
      window.location.href = '/serveur/login/';
      return;
    }
    const data = await res.json();
    if (!res.ok) return;
    render(data);
  } catch {
    // network hiccup — keep last render
  }
}

function render(data) {
  document.getElementById('server-name').textContent = data.server.name;
  document.title = data.server.name + ' — Serveur';
  const alerts = data.help_alerts || [];
  renderRequests(alerts.filter(a => a.kind === 'cancel'), 'cancel-section', 'cancel-container', 'cancel');
  renderRequests(alerts.filter(a => a.kind !== 'cancel'), 'requests-section', 'requests-container', 'call');
  renderReady(data.ready_items);
  renderTables(data.tables);
  renderOrders(data.active_orders);
}

function renderRequests(alerts, sectionId, containerId, kind) {
  const section = document.getElementById(sectionId);
  const container = document.getElementById(containerId);
  if (!alerts.length) {
    section.classList.add('hidden');
    container.innerHTML = '';
    return;
  }
  section.classList.remove('hidden');
  container.innerHTML = '';
  alerts.forEach(a => {
    const card = document.createElement('div');
    const orderLabel = a.order_id ? `Order #${a.order_id} &middot; ` : '';
    let cardCls, title, btnCls;
    if (kind === 'cancel') {
      cardCls = 'bg-red-100 border-2 border-red-500 rounded-xl px-4 py-3 flex items-center justify-between gap-3';
      title = `<p class="font-bold text-red-900">&#x274C; Table ${a.table_number} — cancellation request</p>`;
      btnCls = 'flex-shrink-0 text-xs font-semibold px-3 py-1.5 rounded-lg bg-red-700 hover:bg-red-800 text-white transition-colors';
    } else {
      cardCls = 'bg-amber-50 border-2 border-amber-300 rounded-xl px-4 py-3 flex items-center justify-between gap-3';
      title = `<p class="font-semibold text-amber-800">&#x1F514; Table ${a.table_number} needs help</p>`;
      btnCls = 'flex-shrink-0 text-xs font-semibold px-3 py-1.5 rounded-lg bg-amber-600 hover:bg-amber-700 text-white transition-colors';
    }
    card.className = cardCls;
    card.innerHTML = `
      <div>
        ${title}
        <p class="text-xs ${kind === 'cancel' ? 'text-red-700' : 'text-amber-700'} mt-0.5">${orderLabel}waiting ${a.minutes_waiting} min</p>
      </div>`;

    const actions = document.createElement('div');
    actions.className = 'flex-shrink-0 flex items-center gap-1.5';
    if (kind === 'cancel') {
      // Approve = cancel the order's unserved items; Reject = order continues.
      const approve = document.createElement('button');
      approve.className = 'text-xs font-semibold px-3 py-1.5 rounded-lg bg-red-700 hover:bg-red-800 text-white transition-colors';
      approve.textContent = 'Approve';
      approve.addEventListener('click', () => decideCancel(a.order_id, 'approve', approve));
      const reject = document.createElement('button');
      reject.className = 'text-xs font-semibold px-3 py-1.5 rounded-lg border border-gray-300 text-gray-700 bg-white hover:bg-gray-50 transition-colors';
      reject.textContent = 'Reject';
      reject.addEventListener('click', () => decideCancel(a.order_id, 'reject', reject));
      actions.append(approve, reject);
    } else {
      const btn = document.createElement('button');
      btn.className = btnCls;
      btn.textContent = 'Resolve';
      btn.addEventListener('click', () => resolveAlert(a.id, btn));
      actions.appendChild(btn);
    }
    card.appendChild(actions);
    container.appendChild(card);
  });
}

async function decideCancel(orderId, decision, btn) {
  btn.disabled = true;
  try {
    const res = await fetch(`/api/orders/${orderId}/cancel-decision/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
      body: JSON.stringify({ decision }),
    });
    if (res.status === 401) { window.location.href = '/serveur/login/'; return; }
  } catch {
    // ignore — polling resyncs
  } finally {
    btn.disabled = false;
  }
  fetchDashboard();
}

function renderReady(items) {
  const section = document.getElementById('ready-section');
  const container = document.getElementById('ready-container');
  if (!items.length) {
    section.classList.add('hidden');
    container.innerHTML = '';
    return;
  }
  section.classList.remove('hidden');
  container.innerHTML = '';
  items.forEach(it => {
    const card = document.createElement('div');
    card.className = 'bg-white border border-green-200 rounded-xl px-4 py-3 flex items-center justify-between gap-3 shadow-sm';
    card.innerHTML = `
      <div>
        <p class="font-semibold text-gray-900">${esc(it.name)} <span class="text-gray-500 font-normal">&times;${it.quantity}</span></p>
        <p class="text-xs text-gray-400 mt-0.5">Table ${it.table_number} &middot; Order #${it.order_id}</p>
      </div>`;
    const btn = document.createElement('button');
    btn.className = 'flex-shrink-0 text-xs font-semibold px-3 py-1.5 rounded-lg bg-green-600 hover:bg-green-700 text-white transition-colors';
    btn.textContent = 'Mark Served';
    btn.addEventListener('click', () => serveItem(it.id, btn));
    card.appendChild(btn);
    container.appendChild(card);
  });
}

function renderTables(tables) {
  const container = document.getElementById('tables-container');
  if (!tables.length) {
    container.innerHTML = '<p class="col-span-full text-sm text-gray-400 py-4">No tables assigned to you yet.</p>';
    return;
  }
  container.innerHTML = '';
  tables.forEach(t => {
    const a = document.createElement('a');
    a.href = `/menu/?table=${encodeURIComponent(t.qr_token)}&assisted=1`;
    a.className = 'bg-white border border-gray-200 hover:border-indigo-400 rounded-xl px-3 py-3 text-center shadow-sm transition-colors';
    a.innerHTML = `
      <p class="text-lg font-bold text-gray-900">Table ${t.number}</p>
      <p class="text-xs text-indigo-600 font-semibold mt-0.5">+ New order</p>`;
    container.appendChild(a);
  });
}

function renderOrders(orders) {
  const container = document.getElementById('orders-container');
  if (!orders.length) {
    container.innerHTML = '<p class="text-center text-gray-400 py-10">No active orders right now.</p>';
    return;
  }
  container.innerHTML = '';
  orders.forEach(o => {
    const card = document.createElement('div');
    card.className = 'bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden';

    const itemsHtml = o.items.map(it => `
      <li class="flex items-center justify-between px-4 py-2 text-sm">
        <span class="text-gray-700">${esc(it.name)} <span class="text-gray-400">&times;${it.quantity}</span>
          ${it.notes ? `<span class="italic text-gray-400">&middot; ${esc(it.notes)}</span>` : ''}</span>
        <span class="text-xs font-semibold px-2 py-0.5 rounded-full ${STATUS_BADGE[it.status] || ''}">${STATUS_LABEL[it.status] || it.status}</span>
      </li>`).join('');

    card.innerHTML = `
      <div class="flex items-center justify-between px-4 py-2.5 bg-gray-50 border-b border-gray-100">
        <div class="flex items-center gap-2">
          <span class="font-bold text-gray-900">Table ${o.table_number}</span>
          <span class="text-xs font-semibold px-2 py-0.5 rounded-full ${STATUS_BADGE[o.status] || ''}">${STATUS_LABEL[o.status] || o.status}</span>
        </div>
        <span class="text-xs text-gray-400">#${o.id} &middot; ${o.waiting_minutes} min</span>
      </div>
      <ul class="divide-y divide-gray-50">${itemsHtml}</ul>
      <div class="px-4 py-2 border-t border-gray-100">
        <a href="/menu/?table=${encodeURIComponent(o.table_token)}&assisted=1&add_to=${o.id}"
           class="text-xs font-semibold text-indigo-600 hover:text-indigo-800">+ Add items to this order</a>
      </div>`;

    container.appendChild(card);
  });
}

async function serveItem(id, btn) {
  btn.disabled = true;
  try {
    const res = await fetch(`/api/serveur/order-items/${id}/serve/`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
      body: JSON.stringify({}),
    });
    if (res.status === 401) { window.location.href = '/serveur/login/'; return; }
  } catch {
    // ignore — polling resyncs
  } finally {
    btn.disabled = false;
  }
  fetchDashboard();
}

async function resolveAlert(id, btn) {
  btn.disabled = true;
  try {
    const res = await fetch(`/api/serveur/help-alerts/${id}/resolve/`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
      body: JSON.stringify({}),
    });
    if (res.status === 401) { window.location.href = '/serveur/login/'; return; }
  } catch {
    // ignore — polling resyncs
  } finally {
    btn.disabled = false;
  }
  fetchDashboard();
}

async function logout() {
  try {
    await fetch('/api/serveur/logout/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
      body: JSON.stringify({}),
    });
  } catch {}
  window.location.href = '/serveur/login/';
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

init();
</script>
</body>
</html>
