<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Welcome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { surface:'#0a0a0a', card:'#141414', 'card-2':'#1e1e1e', gold:'#d4a520', 'gold-h':'#b8920a' },
        fontFamily: { display:['"Playfair Display"','Georgia','serif'], sans:['Inter','system-ui','sans-serif'] },
      } },
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @keyframes hubIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
    .hub-in { animation: hubIn .4s ease both; }
    @keyframes livePulse { 0%,100% { opacity:1; } 50% { opacity:.35; } }
    .live-dot { animation: livePulse 1.6s ease-in-out infinite; }
    button:active:not(:disabled), a:active { transform: scale(0.98); transition: transform .05s ease; }
    @media (prefers-reduced-motion: reduce) {
      .hub-in, .live-dot { animation: none !important; }
      button:active, a:active { transform: none !important; }
    }
  </style>
</head>
<body class="bg-surface text-gray-100 font-sans min-h-screen">

  <!-- subtle premium glow -->
  <div class="pointer-events-none fixed inset-x-0 top-0 h-72 bg-gradient-to-b from-gold/10 via-gold/[0.03] to-transparent"></div>

  <main class="relative max-w-md mx-auto px-5 pt-10 pb-[calc(2rem+env(safe-area-inset-bottom))]">

    <!-- Error -->
    <div id="hub-error" class="hidden bg-red-900/30 border border-red-500/30 text-red-400 rounded-xl p-4 text-sm"></div>

    <!-- Header -->
    <header id="hub-header" class="hidden text-center mb-8">
      <p class="text-[11px] font-semibold tracking-[0.3em] text-gold/80 uppercase">Welcome to</p>
      <h1 id="restaurant-name" class="font-display text-4xl font-bold text-white mt-1.5 leading-tight"></h1>
      <div class="mt-4 inline-flex items-center gap-2 bg-card border border-white/10 rounded-full pl-3 pr-4 py-1.5 shadow-sm">
        <i data-lucide="map-pin" class="w-4 h-4 text-gold"></i>
        <span id="table-label" class="text-sm font-medium text-gray-200"></span>
        <span id="server-chip" class="hidden text-xs text-gray-500 border-l border-white/10 pl-2 ml-1"></span>
      </div>
    </header>

    <!-- Actions -->
    <div id="hub-actions" class="hidden space-y-4">

      <!-- Active order card -->
      <section id="active-card" class="hidden hub-in bg-card border border-white/10 rounded-2xl p-5 shadow-xl shadow-black/40">
        <div class="flex items-center justify-between gap-3">
          <p class="text-[11px] font-semibold uppercase tracking-[0.18em] text-gray-500">Your current order</p>
          <span id="active-meta" class="text-[11px] text-gray-500"></span>
        </div>
        <div id="active-status" class="mt-2"></div>

        <a id="track-btn" href="#"
          class="mt-4 flex items-center justify-center gap-2 w-full bg-gold hover:bg-gold-h text-black font-bold py-3.5 rounded-xl transition-colors">
          <i data-lucide="navigation" class="w-4 h-4"></i><span>Track my order</span>
        </a>

        <div class="grid grid-cols-2 gap-2.5 mt-2.5">
          <a id="add-btn" href="#"
            class="flex items-center justify-center gap-2 bg-white/5 hover:bg-white/10 text-white font-semibold py-3 rounded-xl border border-white/10 transition-colors">
            <i data-lucide="plus" class="w-4 h-4"></i><span>Add items</span>
          </a>
          <button id="call-btn" onclick="callServeur()"
            class="flex items-center justify-center gap-2 bg-white/5 hover:bg-white/10 text-white font-semibold py-3 rounded-xl border border-white/10 transition-colors">
            <i data-lucide="bell" class="w-4 h-4"></i><span>Call serveur</span>
          </button>
        </div>
        <p id="call-sent" class="hidden text-center text-sm text-green-400 mt-3 font-medium">A serveur is on the way 👍</p>

        <button id="cancel-btn" onclick="requestCancel()"
          class="block mx-auto mt-3 text-xs font-medium text-gray-500 hover:text-red-300 transition-colors">
          Request cancellation
        </button>
        <p id="cancel-sent" class="hidden text-center text-sm text-amber-300 mt-2 font-medium">A serveur will review your cancellation request.</p>
      </section>

      <!-- Browse / start order (hero) -->
      <a id="menu-btn" href="#"
        class="hub-in flex items-center gap-3 bg-gold hover:bg-gold-h text-black rounded-2xl px-5 py-4 font-bold shadow-lg shadow-gold/20 transition-colors">
        <i data-lucide="utensils" class="w-5 h-5"></i>
        <span id="menu-btn-label" class="flex-1 text-[15px]">Browse menu &amp; order</span>
        <i data-lucide="arrow-right" class="w-5 h-5"></i>
      </a>

      <!-- Leave review (only when a served order has no review) -->
      <a id="review-btn" href="#"
        class="hidden hub-in flex items-center gap-3 bg-card border border-white/10 hover:border-gold/40 rounded-2xl px-5 py-4 transition-colors">
        <span class="flex items-center justify-center w-9 h-9 rounded-full bg-gold/15 text-gold flex-shrink-0">
          <i data-lucide="star" class="w-4 h-4"></i>
        </span>
        <span class="flex-1 font-semibold text-white text-[15px]">How was your meal?<span class="block text-xs font-normal text-gray-400">Leave a quick review</span></span>
        <i data-lucide="chevron-right" class="w-5 h-5 text-gray-500"></i>
      </a>

      <!-- Call serveur when there is no active order -->
      <button id="call-btn-standalone" onclick="callServeur()"
        class="hidden hub-in w-full flex items-center gap-3 bg-card border border-white/10 hover:border-gold/40 rounded-2xl px-5 py-4 transition-colors">
        <span class="flex items-center justify-center w-9 h-9 rounded-full bg-gold/15 text-gold flex-shrink-0">
          <i data-lucide="bell" class="w-4 h-4"></i>
        </span>
        <span class="flex-1 text-left font-semibold text-white text-[15px]">Need help?<span class="block text-xs font-normal text-gray-400">Call a serveur to your table</span></span>
      </button>
      <p id="call-sent-standalone" class="hidden text-center text-sm text-green-400 font-medium">A serveur is on the way 👍</p>

      <!-- Loyalty -->
      <section class="hub-in bg-card border border-white/10 rounded-2xl p-5 shadow-sm">
        <div class="flex items-center gap-2 mb-1">
          <i data-lucide="gift" class="w-4 h-4 text-gold"></i>
          <h2 class="text-sm font-semibold text-white">My loyalty points</h2>
        </div>
        <p class="text-xs text-gray-500 mb-3">Enter your phone to see points earned with us.</p>
        <div id="loyalty-input-wrap" class="flex gap-2">
          <input id="phone-input" type="tel" inputmode="tel" placeholder="Your phone number"
            class="flex-1 bg-white/5 border border-white/10 text-white placeholder-gray-500 rounded-xl px-3.5 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-gold" />
          <button onclick="checkLoyalty()"
            class="bg-gold hover:bg-gold-h text-black text-sm font-bold px-5 rounded-xl transition-colors">Check</button>
        </div>
        <div id="loyalty-result" class="hidden mt-4 text-center"></div>
        <p id="loyalty-error" class="hidden text-red-400 text-xs mt-2"></p>
      </section>

    </div>
  </main>

<script>
const state = {
  tableToken: new URLSearchParams(location.search).get('table') || '',
  data: null,
};

function getCsrfToken() {
  const match = document.cookie.match(/(?:^|;\s*)csrftoken=([^;]+)/);
  return match ? match[1] : '';
}

const STATUS_STYLE = {
  NEW:       { label: 'Received',       dot: 'bg-blue-400',  cls: 'border-blue-400/30 bg-blue-400/10 text-blue-200',   live: true  },
  PREPARING: { label: 'Being prepared', dot: 'bg-amber-400', cls: 'border-amber-400/30 bg-amber-400/10 text-amber-200', live: true  },
  READY:     { label: 'Ready to serve', dot: 'bg-green-400', cls: 'border-green-400/30 bg-green-400/10 text-green-200', live: true  },
  SERVED:    { label: 'Served',         dot: 'bg-teal-400',  cls: 'border-teal-400/30 bg-teal-400/10 text-teal-200',    live: false },
};

function statusPillHtml(status) {
  const s = STATUS_STYLE[status] || STATUS_STYLE.NEW;
  return `<span class="inline-flex items-center gap-2 text-sm font-semibold px-3 py-1.5 rounded-full border ${s.cls}">
            <span class="w-2 h-2 rounded-full ${s.dot} ${s.live ? 'live-dot' : ''}"></span>${s.label}
          </span>`;
}

async function init() {
  if (!state.tableToken) {
    showError('No table found in the link. Please scan the QR code on your table again.');
    return;
  }
  try {
    const res = await fetch(`/api/table/?table=${encodeURIComponent(state.tableToken)}`);
    const data = await res.json();
    if (!res.ok) { showError(data.error || 'Could not load your table.'); return; }
    state.data = data;
    render(data);
  } catch {
    showError('Could not connect. Please try again.');
  }
  lucide.createIcons();
}

function showError(msg) {
  const el = document.getElementById('hub-error');
  el.textContent = msg;
  el.classList.remove('hidden');
}

function render(data) {
  document.getElementById('hub-header').classList.remove('hidden');
  document.getElementById('hub-actions').classList.remove('hidden');

  document.getElementById('restaurant-name').textContent = data.restaurant.name;
  document.getElementById('table-label').textContent = `Table ${data.table.number}`;
  document.title = `Table ${data.table.number} — ${data.restaurant.name}`;

  if (data.server_name) {
    const s = document.getElementById('server-chip');
    s.textContent = data.server_name;
    s.classList.remove('hidden');
  }

  const menuBase = `/menu/?table=${encodeURIComponent(state.tableToken)}`;
  document.getElementById('menu-btn').href = menuBase;

  const active = data.active_orders[0]; // most recent active order
  if (active) {
    document.getElementById('menu-btn-label').textContent = 'Browse menu & start another order';
    const card = document.getElementById('active-card');
    card.classList.remove('hidden');
    document.getElementById('active-status').innerHTML = statusPillHtml(active.status);
    document.getElementById('active-meta').textContent =
      `#${active.id} · ${active.item_count} item${active.item_count !== 1 ? 's' : ''}`;
    document.getElementById('track-btn').href = `/order/${active.id}/`;
    document.getElementById('add-btn').href = `${menuBase}&add_to=${active.id}`;

    // Cancellation: offer only at NEW/PREPARING with no request already pending.
    const cancelBtn  = document.getElementById('cancel-btn');
    const cancelSent = document.getElementById('cancel-sent');
    const canCancel = (active.status === 'NEW' || active.status === 'PREPARING') && !active.cancel_pending;
    cancelBtn.classList.toggle('hidden', !canCancel);
    if (active.cancel_pending) {
      cancelSent.textContent = 'Cancellation requested — a serveur is coming to confirm.';
      cancelSent.classList.remove('hidden');
    } else {
      cancelSent.classList.add('hidden');
    }
  } else {
    // No active order — offer a standalone "call serveur" entry instead.
    document.getElementById('call-btn-standalone').classList.remove('hidden');
  }

  if (data.reviewable_order_id) {
    const r = document.getElementById('review-btn');
    r.href = `/order/${data.reviewable_order_id}/`;
    r.classList.remove('hidden');
  }
}

async function callServeur() {
  // Table-level help works whether or not an order exists yet.
  try {
    const res = await fetch('/api/table/help/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
      body: JSON.stringify({ table: state.tableToken }),
    });
    if (res.ok) {
      document.getElementById('call-sent').classList.remove('hidden');
      document.getElementById('call-sent-standalone').classList.remove('hidden');
      const b1 = document.getElementById('call-btn'); if (b1) b1.disabled = true;
      const b2 = document.getElementById('call-btn-standalone'); if (b2) b2.disabled = true;
    }
  } catch {
    // ignore — they can tap again
  }
}

async function requestCancel() {
  // Cancellation is tied to the active order (only shown when one exists).
  const active = state.data && state.data.active_orders[0];
  if (!active) return;
  const btn = document.getElementById('cancel-btn');
  if (btn) btn.disabled = true;
  try {
    const res = await fetch(`/api/orders/${active.id}/help/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
      body: JSON.stringify({ kind: 'cancel' }),
    });
    const data = await res.json().catch(() => ({}));
    if (res.ok) {
      const sent = document.getElementById('cancel-sent');
      // NEW auto-cancels instantly; PREPARING becomes a pending request.
      sent.textContent = data.cancel_state === 'canceled'
        ? 'Your order has been canceled.'
        : 'Cancellation requested — a serveur is coming to confirm.';
      sent.classList.remove('hidden');
      if (btn) btn.classList.add('hidden');
    } else if (btn) {
      btn.disabled = false;
    }
  } catch {
    if (btn) btn.disabled = false;
  }
}

async function checkLoyalty() {
  const phone = document.getElementById('phone-input').value.trim();
  const resultEl = document.getElementById('loyalty-result');
  const errEl = document.getElementById('loyalty-error');
  errEl.classList.add('hidden');
  resultEl.classList.add('hidden');
  if (!phone) { errEl.textContent = 'Please enter your phone number.'; errEl.classList.remove('hidden'); return; }

  try {
    const res = await fetch(`/api/customer/?phone=${encodeURIComponent(phone)}`);
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Could not check points.'; errEl.classList.remove('hidden'); return; }
    if (!data.found) {
      resultEl.innerHTML = '<p class="text-sm text-gray-400">No points yet — order with this number to start earning.</p>';
    } else {
      resultEl.innerHTML = `
        <p class="font-display text-5xl font-bold text-gold leading-none">${data.loyalty_points}</p>
        <p class="text-xs text-gray-400 mt-1.5 uppercase tracking-wide">loyalty points</p>`;
    }
    resultEl.classList.remove('hidden');
  } catch {
    errEl.textContent = 'Could not connect. Please try again.';
    errEl.classList.remove('hidden');
  }
}

init();
</script>
</body>
</html>
