<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { surface:'#0a0a0a', card:'#141414', 'card-2':'#1e1e1e', gold:'#d4a520', 'gold-h':'#b8920a' },
        fontFamily: { display:['"Playfair Display"','Georgia','serif'], sans:['Inter','system-ui','sans-serif'] },
      } },
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-surface text-gray-100 font-sans min-h-screen">

  <main class="max-w-md mx-auto px-5 py-8">

    <!-- Error -->
    <div id="hub-error" class="hidden bg-red-900/30 border border-red-500/30 text-red-400 rounded-lg p-4"></div>

    <!-- Header -->
    <header id="hub-header" class="hidden text-center mb-8">
      <p class="text-[11px] font-semibold tracking-[0.25em] text-gold/80 uppercase">Welcome</p>
      <h1 id="restaurant-name" class="font-display text-3xl font-bold text-white mt-1"></h1>
      <div class="mt-3 inline-flex items-center gap-2 bg-card border border-white/10 rounded-full px-4 py-1.5">
        <i data-lucide="map-pin" class="w-4 h-4 text-gold"></i>
        <span id="table-label" class="text-sm font-medium text-gray-200"></span>
      </div>
      <p id="server-label" class="hidden text-sm text-gray-400 mt-2"></p>
    </header>

    <!-- Actions -->
    <div id="hub-actions" class="hidden space-y-3">

      <!-- Active order card -->
      <section id="active-card" class="hidden bg-card border border-gold/20 rounded-2xl p-5">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-xs text-gray-400 uppercase tracking-wide">Your current order</p>
            <p class="mt-0.5"><span id="active-status" class="font-display text-xl font-bold text-gold"></span></p>
          </div>
          <span id="active-meta" class="text-xs text-gray-500"></span>
        </div>
        <div class="grid grid-cols-2 gap-2 mt-4">
          <a id="track-btn" href="#" class="text-center bg-gold hover:bg-gold-h text-black font-bold py-2.5 rounded-xl transition-colors">Track order</a>
          <a id="add-btn" href="#" class="text-center bg-card-2 hover:bg-white/10 text-white font-semibold py-2.5 rounded-xl border border-white/10 transition-colors">Add more items</a>
        </div>
        <button id="call-btn" onclick="callServeur()"
          class="w-full mt-2 flex items-center justify-center gap-2 bg-card-2 hover:bg-white/10 text-white font-semibold py-2.5 rounded-xl border border-white/10 transition-colors">
          <i data-lucide="bell" class="w-4 h-4"></i><span>Call serveur</span>
        </button>
        <p id="call-sent" class="hidden text-center text-sm text-green-400 mt-2 font-medium">A serveur is on the way 👍</p>
      </section>

      <!-- Browse / start order -->
      <a id="menu-btn" href="#"
        class="flex items-center gap-3 bg-gold hover:bg-gold-h text-black rounded-2xl px-5 py-4 font-bold transition-colors">
        <i data-lucide="utensils" class="w-5 h-5"></i>
        <span id="menu-btn-label" class="flex-1">Browse menu &amp; order</span>
        <i data-lucide="chevron-right" class="w-5 h-5"></i>
      </a>

      <!-- Leave review (only when a served order has no review) -->
      <a id="review-btn" href="#"
        class="hidden flex items-center gap-3 bg-card border border-white/10 hover:border-gold/40 rounded-2xl px-5 py-4 transition-colors">
        <i data-lucide="star" class="w-5 h-5 text-gold"></i>
        <span class="flex-1 font-semibold text-white">How was your meal? Leave a review</span>
        <i data-lucide="chevron-right" class="w-5 h-5 text-gray-500"></i>
      </a>

      <!-- Call serveur when there is no active order -->
      <button id="call-btn-standalone" onclick="callServeur()"
        class="hidden w-full flex items-center gap-3 bg-card border border-white/10 hover:border-gold/40 rounded-2xl px-5 py-4 transition-colors">
        <i data-lucide="bell" class="w-5 h-5 text-gold"></i>
        <span class="flex-1 text-left font-semibold text-white">Need help? Call a serveur</span>
      </button>
      <p id="call-sent-standalone" class="hidden text-center text-sm text-green-400 font-medium">A serveur is on the way 👍</p>

      <!-- Loyalty -->
      <section class="bg-card border border-white/10 rounded-2xl p-5">
        <div class="flex items-center gap-2 mb-3">
          <i data-lucide="gift" class="w-4 h-4 text-gold"></i>
          <h2 class="text-sm font-semibold text-white">My loyalty points</h2>
        </div>
        <div id="loyalty-input-wrap" class="flex gap-2">
          <input id="phone-input" type="tel" placeholder="Your phone number"
            class="flex-1 bg-white/5 border border-white/10 text-white placeholder-gray-500 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gold" />
          <button onclick="checkLoyalty()"
            class="bg-card-2 hover:bg-white/10 text-white text-sm font-semibold px-4 rounded-lg border border-white/10 transition-colors">Check</button>
        </div>
        <div id="loyalty-result" class="hidden mt-3 text-center"></div>
        <p id="loyalty-error" class="hidden text-red-400 text-xs mt-2"></p>
      </section>

    </div>
  </main>

<script>
const state = {
  tableToken: new URLSearchParams(location.search).get('table') || '',
  data: null,
};

function getCsrfToken() {
  const match = document.cookie.match(/(?:^|;\s*)csrftoken=([^;]+)/);
  return match ? match[1] : '';
}

const STATUS_LABEL = { NEW: 'Received', PREPARING: 'Being prepared', READY: 'Ready to serve', SERVED: 'Served' };

async function init() {
  if (!state.tableToken) {
    showError('No table found in the link. Please scan the QR code on your table again.');
    return;
  }
  try {
    const res = await fetch(`/api/table/?table=${encodeURIComponent(state.tableToken)}`);
    const data = await res.json();
    if (!res.ok) { showError(data.error || 'Could not load your table.'); return; }
    state.data = data;
    render(data);
  } catch {
    showError('Could not connect. Please try again.');
  }
  lucide.createIcons();
}

function showError(msg) {
  const el = document.getElementById('hub-error');
  el.textContent = msg;
  el.classList.remove('hidden');
}

function render(data) {
  document.getElementById('hub-header').classList.remove('hidden');
  document.getElementById('hub-actions').classList.remove('hidden');

  document.getElementById('restaurant-name').textContent = data.restaurant.name;
  document.getElementById('table-label').textContent = `Table ${data.table.number}`;
  document.title = `Table ${data.table.number} — ${data.restaurant.name}`;

  if (data.server_name) {
    const s = document.getElementById('server-label');
    s.textContent = `Served by ${data.server_name}`;
    s.classList.remove('hidden');
  }

  const menuBase = `/menu/?table=${encodeURIComponent(state.tableToken)}`;
  document.getElementById('menu-btn').href = menuBase;

  const active = data.active_orders[0]; // most recent active order
  if (active) {
    document.getElementById('menu-btn-label').textContent = 'Browse menu & start another order';
    const card = document.getElementById('active-card');
    card.classList.remove('hidden');
    document.getElementById('active-status').textContent = STATUS_LABEL[active.status] || active.status;
    document.getElementById('active-meta').textContent =
      `Order #${active.id} · ${active.item_count} item${active.item_count !== 1 ? 's' : ''}`;
    document.getElementById('track-btn').href = `/order/${active.id}/`;
    document.getElementById('add-btn').href = `${menuBase}&add_to=${active.id}`;
  } else {
    // No active order — offer a standalone "call serveur" entry instead.
    document.getElementById('call-btn-standalone').classList.remove('hidden');
  }

  if (data.reviewable_order_id) {
    const r = document.getElementById('review-btn');
    r.href = `/order/${data.reviewable_order_id}/`;
    r.classList.remove('hidden');
  }
}

async function callServeur() {
  // Table-level help works whether or not an order exists yet.
  try {
    const res = await fetch('/api/table/help/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
      body: JSON.stringify({ table: state.tableToken }),
    });
    if (res.ok) {
      document.getElementById('call-sent').classList.remove('hidden');
      document.getElementById('call-sent-standalone').classList.remove('hidden');
      const b1 = document.getElementById('call-btn'); if (b1) b1.disabled = true;
      const b2 = document.getElementById('call-btn-standalone'); if (b2) b2.disabled = true;
    }
  } catch {
    // ignore — they can tap again
  }
}

async function checkLoyalty() {
  const phone = document.getElementById('phone-input').value.trim();
  const resultEl = document.getElementById('loyalty-result');
  const errEl = document.getElementById('loyalty-error');
  errEl.classList.add('hidden');
  resultEl.classList.add('hidden');
  if (!phone) { errEl.textContent = 'Please enter your phone number.'; errEl.classList.remove('hidden'); return; }

  try {
    const res = await fetch(`/api/customer/?phone=${encodeURIComponent(phone)}`);
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Could not check points.'; errEl.classList.remove('hidden'); return; }
    if (!data.found) {
      resultEl.innerHTML = '<p class="text-sm text-gray-400">No points yet — place an order with this number to start earning.</p>';
    } else {
      resultEl.innerHTML = `
        <p class="font-display text-4xl font-bold text-gold">${data.loyalty_points}</p>
        <p class="text-xs text-gray-400 mt-1">loyalty points</p>`;
    }
    resultEl.classList.remove('hidden');
  } catch {
    errEl.textContent = 'Could not connect. Please try again.';
    errEl.classList.remove('hidden');
  }
}

init();
</script>
</body>
</html>
